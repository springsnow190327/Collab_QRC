# Nav2 full-stack config for **REAL Go2 (non-wheeled, walking quadruped)**.
#
# Twin of nav2_go2_full_stack.yaml (sim), retuned for the real robot.
# What's different from the sim file (and why):
#
#   ── Time + namespace ──
#   - use_sim_time = false everywhere (wallclock).
#   - Topics use /robot/... instead of /robot_b/... (real is single-robot;
#     no PushRosNamespace rewrite via /robot_[ab]/ regex needed since the
#     names already match).
#   - bt_navigator.odom_topic fixed: sim file has a copy-paste typo
#     /robot_a/odom/nav (should be the legged robot's odom). Real points
#     at /robot/odom/nav directly.
#
#   ── Planner: SmacPlannerHybrid budget ──
#   - max_iterations 1,000,000 → 80,000 (real laptop CPU + indoor scenes
#     converge well under 80k iters; 1M was uselessly large and let bad
#     plans run for the full 5s timeout repeatedly).
#   - max_planning_time 5.0 → 1.5 s (fail-fast; bt_navigator retry loop
#     wins back wall-time slowness).
#   - cache_obstacle_heuristic false → true (reuse heuristic between
#     replans — single-goal incremental-map scenarios benefit massively
#     from this; ~3-5× planner speedup on real after warmup).
#
#   ── Costmaps: Mid-360 noise tolerance ──
#   - local_costmap.inflation_radius 0.25 → 0.18 (Mid-360 specular
#     speckle creates spurious occupied cells; wider inflation paints
#     "almost-lethal" bands across corridors → MPPI rejects every
#     trajectory → robot stamps in place).
#   - local_costmap.cost_scaling_factor 5.0 → 3.0 (softer cost gradient;
#     the lethal penalty only spikes near the boundary, not 0.45 m out).
#   - global_costmap.inflation_radius 0.20 → 0.18, scaling 5.0 → 3.0
#     (matched).
#   - global_costmap.update_frequency 1.0 → 2.0 (more responsive to
#     incremental octomap updates; planner uses fresher map each replan).
#
#   ── MPPI: laptop CPU budget + less aggressive obstacle critic ──
#   - batch_size 2000 → 1000 (half the trajectory samples per cycle;
#     20 Hz controller_frequency held without dropping frames).
#   - ObstaclesCritic.critical_weight 20.0 → 8.0 (less drastic rejection
#     for trajectories whose footprint marginally clips inflated cells —
#     paired with the inflation_radius drop above so that "marginal clip"
#     still means a real-cell collision is unlikely; main lever to break
#     the "robot won't move" pathology).
#
# Topics (real, single-robot — namespace = /robot):
#   /robot/map               (OccupancyGrid from octomap_server)
#   /robot/odom/nav          (from fast_lio_tf_adapter)
#   /robot/scan_3d           (from scan_rear_filter)
#   /tf, /tf_static          (global, single-robot)

# ============================================================
# COSTMAPS
# ============================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link  # Real single-robot: no b_-prefix (sim convention only)
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # Go2 footprint: 0.65 × 0.30 m (no wheel hubs). Half-extents (0.325, 0.15).
      # See nav2_go2_full_stack.yaml comment block for the geometric derivation.
      footprint: "[[0.325, 0.15], [0.325, -0.15], [-0.325, -0.15], [-0.325, 0.15]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /robot/scan_3d
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          obstacle_max_range: 5.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Real-robot tighter inflation: 0.18 = body half-width 0.15 +
        # 0.03 m sway buffer. Sim used 0.25 with clean walls; on real
        # the Mid-360 speckle creates spurious occupied cells whose
        # 0.25-m inflation flood the local costmap with "almost lethal"
        # cost, causing MPPI to reject every sampled trajectory.
        inflation_radius: 0.18
        # Softer cost gradient so MPPI's ObstaclesCritic doesn't
        # immediately spike near a single noisy occupied cell.
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # 2.0 Hz update (vs sim 1.0): real octomap arrives incrementally
      # as Fast-LIO maps each scan; faster refresh keeps planner from
      # replanning on a stale map and re-failing.
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.325, 0.15], [0.325, -0.15], [-0.325, -0.15], [-0.325, 0.15]]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /robot/map
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.18
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

# ============================================================
# PLANNER SERVER (SmacPlannerHybrid, REEDS_SHEPP)
# ============================================================
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.4
      allow_unknown: true
      # 80k vs sim's 1M. Indoor environments converge well below 80k;
      # 1M let pathological cases burn the full 1.5 s budget repeatedly.
      max_iterations: 80000
      # 1.5 s vs sim's 5.0. Fail-fast philosophy: better 4× retries at
      # 1.5 s each than one 5 s attempt that times out anyway.
      max_planning_time: 1.5
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 36
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      # Go2 walking-gait pivots in place via CHAMP's in-place rotation.
      minimum_turning_radius: 0.05
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      # ENABLE on real: heuristic cache reuse across replans gives a
      # huge speedup once the map stabilises (~3-5× empirical). Disabled
      # in sim because dual-robot map churns continuously; real
      # single-robot incremental mapping is the ideal use case.
      cache_obstacle_heuristic: true
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ============================================================
# CONTROLLER SERVER (Nav2 MPPI)
# ============================================================
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 12.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 0.50
      stateful: true
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      # 1000 vs sim's 2000. Halves CPU per controller cycle; we keep
      # 20 Hz controller_frequency cleanly on the laptop and trajectory
      # quality stays good for indoor speeds (vx_max=0.30).
      batch_size: 1000
      vx_std: 0.20
      vy_std: 0.20
      wz_std: 0.40
      vx_max: 0.30       # CHAMP walking-gait stable cap
      vx_min: -0.10      # Go2 reverses but slow
      vy_max: 0.0        # diff-drive — no strafe
      wz_max: 0.8        # gentler pivot than wheels
      ax_max: 0.30       # softer accel for walking
      ax_min: -0.40
      ay_max: 0.0
      az_max: 1.0
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstrains:
        min_turning_r: 0.3
      critics:
        - "ConstraintCritic"
        - "ObstaclesCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        # 8.0 vs sim's 20.0. With Mid-360 speckle producing brief
        # one-cycle occupied cells, the rotated-rectangle overlap check
        # fires often even when the noise has cleared by the next
        # cycle. Critical_weight 20 made every such cycle output
        # zero velocity (robot wouldn't move). 8.0 still strongly
        # discourages collision but lets MPPI pick a flow-around
        # trajectory instead of giving up.
        critical_weight: 8.0
        consider_footprint: true
        collision_cost: 10000.0
        collision_margin_distance: 0.03
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.2
        mode: 0

# ============================================================
# BEHAVIOR SERVER (recovery primitives)
# ============================================================
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.5

# ============================================================
# BT NAVIGATOR (orchestrates planner + controller + behaviors)
# ============================================================
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    # Real-robot odom: /robot/odom/nav. Sim file had /robot_a/odom/nav
    # (typo, should have been robot_b's).
    odom_topic: /robot/odom/nav
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# ============================================================
# LIFECYCLE MANAGER
# ============================================================
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 0.0
    node_names:
      - "controller_server"
      - "planner_server"
      - "behavior_server"
      - "bt_navigator"
