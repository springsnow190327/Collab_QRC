# Shared costmap parameters between global and local. Mirrors the
# corresponding subset of Nav2's nav2_go2_full_stack.yaml.

# Robot footprint — same Go2 rectangle as the Nav2 sim yaml (~0.64×0.36m
# after 2026-05-18 tightening). consider_footprint=true on MPPI side, so
# this polygon is the actual collision envelope (not robot_radius).
footprint: "[[0.32, 0.18], [0.32, -0.18], [-0.32, -0.18], [-0.32, 0.18]]"
footprint_padding: 0.02

# Layers: just static (reads /<ns>/traversability_grid from trav_pipeline_ros1)
# + inflation. The 12-layer ETH+CNN+ramp_safe pipeline already produced the
# fused trav_grid upstream, so costmap_2d's role here is purely to consume
# that OccupancyGrid and apply the same InflationLayer Nav2 uses.
plugins:
  - {name: static_layer,     type: "costmap_2d::StaticLayer"}
  - {name: inflation_layer,  type: "costmap_2d::InflationLayer"}

static_layer:
  map_topic: /robot/traversability_grid
  subscribe_to_updates: true
  track_unknown_space: true
  use_maximum: false
  trinary_costmap: false
  unknown_cost_value: 255

inflation_layer:
  inflation_radius: 0.20      # matches Nav2 yaml 2026-05-18 tightening
  cost_scaling_factor: 5.0    # ditto
