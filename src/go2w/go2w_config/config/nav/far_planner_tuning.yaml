# FAR planner tuning params — edit this file for rapid testing.
# Loaded by nav_test_mujoco_fastlio.launch.py (and nav_test_mujoco.launch.py
# when updated to use it). Changes take effect on next launch, no rebuild needed.
#
# Usage: edit values here, re-launch. See CLAUDE.md Phase 5 "Tuning iterations"
# for what each param does and what values have been tried.

far_planner:
  ros__parameters:
    # Graph convergence
    g_planner/converge_distance: 0.5    # m — FAR publishes next waypoint at this distance
    g_planner/path_momentum_thred: 25   # cycles to stick with current path (iter 7: was 10)
    graph/connect_votes_size: 5         # cycles before edge accepted into graph

    # Grid resolution — one cell = voxel_dim metres. Default 0.2 m.
    # obs_inflate_size inflates by this many cells PER SIDE.
    # inflate=2 at voxel_dim=0.2 → 0.4 m buffer per side → 0.8 m total added width.
    voxel_dim: 0.2                      # m per grid cell (FAR internal, NOT occupancy grid)

    # Obstacle handling
    util/terrain_free_Z: 0.45           # m — points below this height = traversable
    util/obs_inflate_size: 1            # cells — 2 × 0.2m = 0.4m buffer per side
    util/dynamic_obs_dacay_time: 3.0    # s — how long obstacle evidence persists (iter 8: was 0.5)
    util/new_points_decay_time: 3.0     # s — how long new scan points persist (iter 8: was 0.5)

    # Range limits
    sensor_range: 6.0                   # m — how far FAR looks for obstacles
    terrain_range: 4.5                  # m
    local_planner_range: 2.0            # m
    map_handler/map_grid_max_length: 30.0  # m — max graph grid size

    # Debug
    is_debug_output: false
    is_opencv_visual: false

    # World frame (must match TF tree)
    world_frame: "map"
