services:
  ros1_master:
    image: ros:noetic-ros-core
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://127.0.0.1:11311}
      - ROS_HOSTNAME=${ROS_HOSTNAME:-127.0.0.1}
      - ROS_IP=${ROS_IP:-127.0.0.1}
    command: roscore

  ros1_hybrid_slam:
    build:
      context: ../..
      dockerfile: docker/ros1_hybrid_slam/Dockerfile
    network_mode: host
    depends_on:
      - ros1_master
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://127.0.0.1:11311}
      - ROS_HOSTNAME=${ROS_HOSTNAME:-127.0.0.1}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-sim_hybrid_ros1_slam_ros2_nav}
      - SLAM_BACKEND=${SLAM_BACKEND:-swarm_lio2_shadow}
      - DYNAMIC_FILTER_BACKEND=${DYNAMIC_FILTER_BACKEND:-temporal_voxel_fallback}
      - STATIC_MAP_CLEANUP_BACKEND=${STATIC_MAP_CLEANUP_BACKEND:-none}
      - ROBOT_NAMESPACES=${ROBOT_NAMESPACES:-robot_a robot_b}
      - SWARM_LIO2_FEED_SOURCE=${SWARM_LIO2_FEED_SOURCE:-sim_bridge}
      - SWARM_LIO2_SYNTHETIC_RATE_HZ=${SWARM_LIO2_SYNTHETIC_RATE_HZ:-5.0}
      - ROBOT_A_SWARM_LIO2_LIDAR_TOPIC=${ROBOT_A_SWARM_LIO2_LIDAR_TOPIC:-/robot_a/velodyne_points}
      - ROBOT_A_SWARM_LIO2_IMU_TOPIC=${ROBOT_A_SWARM_LIO2_IMU_TOPIC:-/robot_a/imu/data}
      - ROBOT_B_SWARM_LIO2_LIDAR_TOPIC=${ROBOT_B_SWARM_LIO2_LIDAR_TOPIC:-/robot_b/velodyne_points}
      - ROBOT_B_SWARM_LIO2_IMU_TOPIC=${ROBOT_B_SWARM_LIO2_IMU_TOPIC:-/robot_b/imu/data}
    volumes:
      - ../../external:/external:ro
      - ../../.local_deps/ros1_hybrid_slam_ws:/catkin_ws
      - ../../logs:/logs
    command: run

  ros1_bridge:
    image: ${ROS1_BRIDGE_IMAGE:-ros:foxy-ros1-bridge}
    network_mode: host
    depends_on:
      - ros1_hybrid_slam
    environment:
      - ROS1_DISTRO=${ROS1_DISTRO:-noetic}
      - ROS2_DISTRO_IN_BRIDGE=${ROS2_DISTRO_IN_BRIDGE:-foxy}
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://127.0.0.1:11311}
      - ROS_HOSTNAME=${ROS_HOSTNAME:-127.0.0.1}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      - FASTRTPS_DEFAULT_PROFILES_FILE=${ROS1_HYBRID_FASTRTPS_PROFILE:-/config/fastdds_no_shm.xml}
    volumes:
      - ../../config:/config:ro
      - ./bridge.yaml:/bridge.yaml:ro
      - ./ros1_bridge_entrypoint.sh:/ros1_bridge_entrypoint.sh:ro
    command: bash /ros1_bridge_entrypoint.sh
