# Combined ros2_control config for dual-robot MuJoCo nav scenes (demo3_dual).
# Single controller_manager serves both robots. No door barrier controller.
# Robot A: un-prefixed joints.  Robot B: b_-prefixed joints.

/**:
  ros__parameters:
    use_sim_time: true
    update_rate: 200

    robot_a_joint_states_controller:
      type: joint_state_broadcaster/JointStateBroadcaster
    robot_a_joint_group_effort_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    robot_a_wheel_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    robot_b_joint_states_controller:
      type: joint_state_broadcaster/JointStateBroadcaster
    robot_b_joint_group_effort_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    robot_b_wheel_velocity_controller:
      type: forward_command_controller/ForwardCommandController

# ── Robot A effort controller ──
/**/robot_a_joint_group_effort_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    gains:
      FL_hip_joint:   {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FL_thigh_joint: {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FL_calf_joint:  {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FR_hip_joint:   {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FR_thigh_joint: {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FR_calf_joint:  {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RL_hip_joint:   {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RL_thigh_joint: {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RL_calf_joint:  {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RR_hip_joint:   {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RR_thigh_joint: {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RR_calf_joint:  {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}

# ── Robot A wheel controller ──
/**/robot_a_wheel_velocity_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - FL_foot_joint
      - FR_foot_joint
      - RL_foot_joint
      - RR_foot_joint
    interface_name: velocity

# ── Robot B effort controller ──
/**/robot_b_joint_group_effort_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - b_FL_hip_joint
      - b_FL_thigh_joint
      - b_FL_calf_joint
      - b_FR_hip_joint
      - b_FR_thigh_joint
      - b_FR_calf_joint
      - b_RL_hip_joint
      - b_RL_thigh_joint
      - b_RL_calf_joint
      - b_RR_hip_joint
      - b_RR_thigh_joint
      - b_RR_calf_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    gains:
      b_FL_hip_joint:   {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_FL_thigh_joint: {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_FL_calf_joint:  {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_FR_hip_joint:   {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_FR_thigh_joint: {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_FR_calf_joint:  {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_RL_hip_joint:   {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_RL_thigh_joint: {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_RL_calf_joint:  {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_RR_hip_joint:   {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_RR_thigh_joint: {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      b_RR_calf_joint:  {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}

# ── Robot B wheel controller ──
/**/robot_b_wheel_velocity_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - b_FL_foot_joint
      - b_FR_foot_joint
      - b_RL_foot_joint
      - b_RR_foot_joint
    interface_name: velocity
