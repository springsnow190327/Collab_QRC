# Docker-compose for GBPlanner3 ↔ Collab_QRC MuJoCo integration.
#
# Run via:
#   make launch DOCKER_COMPOSE_FILE=$(realpath compose/docker-compose.collab_qrc.yml)
# from inside ~/Research/uas_deploy/unified_autonomy_stack.
#
# Disables:
#   - ros2_launch_ugv_sim   (NTNU Gazebo + smb_arl — we use Collab_QRC MuJoCo instead)
#   - ros1_launch_bridge_params (loads smb_arl-specific bridge params)
#
# Activates:
#   - ros1_launch_roscore
#   - ros1_launch_gbplanner   (now configured for Collab_QRC Go2 via volume-mounted config)
#   - ros2_launch_ros1_bridge (uses our bridge_topics_collab_qrc.yaml white-listing
#                              Fast-LIO outputs from Humble → Noetic)

# ==================== ANCHORS ====================
x-system-template: &system-template
  working_dir: /workspace
  network_mode: host
  ipc: host
  restart: "no"
  stdin_open: true
  tty: true
  # Cap each container's json.log at 20 MB × 3 rotations = 60 MB max.
  # gbplanner emits "No 'elevation' layer in map" at multi-kHz when
  # elevation_mapping fails to produce the elevation layer (kGroundRobot
  # gate), which previously filled the host's docker data-root (/home/docker
  # ≈ 1.4 TB but shared with /home) and made the whole sim unrecoverable.
  # See elevation_mapping_config.yaml header for the original failure note.
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "3"
  environment:
  - DISPLAY=${DISPLAY:-:0}
  - NVIDIA_VISIBLE_DEVICES=all
  - NVIDIA_DRIVER_CAPABILITIES=all
  - QT_X11_NO_MITSHM=1
  - DISABLE_ROS1_EOL_WARNINGS=1
  - ROS_DOMAIN_ID=${DOMAIN_ID:-0}
  volumes:
    - /tmp/.X11-unix:/tmp/.X11-unix:rw

x-ros1-wait-for-roscore: &ros1-wait-for-roscore
  depends_on:
    ros1_launch_roscore:
      condition: service_healthy

# ==================== SERVICES ====================
services:

  # --- roscore (Noetic) ---
  ros1_launch_roscore:
    <<: [*system-template]
    image: unified_autonomy:ros1_base
    profiles: ["launch"]
    command: roscore
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'source /opt/ros/noetic/setup.bash && rostopic list || exit 1'"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 3s

  # --- GBPlanner3 (Collab_QRC Go2 mission) ---
  # Pass roslaunch args + CLI remaps to point gbplanner_sim.launch at the
  # exact topics that Humble + the bridge will deliver on the Noetic side:
  #   /robot/Odometry             (Fast-LIO, bridged 1:1 from Humble)
  #   /robot/cloud_registered_body (Mid-360 cloud, bridged 1:1 from Humble)
  #   /robot/tf, /robot/tf_static  (bridged 1:1 from Humble — see launcher
  #                                 which adds Humble-side ros2 topic relay
  #                                 to publish /tf as well, so default tf2
  #                                 lookups still work on the Noetic side)
  ros1_launch_gbplanner:
    <<: [*system-template, *ros1-wait-for-roscore]
    image: unified_autonomy:ros1_gbplanner
    profiles: ["launch"]
    privileged: true
    devices:
      - /dev/dri:/dev/dri
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${UAS_REPO_ROOT}/workspaces/robot_bringup:/workspace/src/robot_bringup:rw
      - ${UAS_REPO_ROOT}/workspaces/ws_gbplanner:/workspace:rw
      - ${COLLAB_QRC_ROOT}/scripts/sim/gbplanner3_mujoco/config/collab_qrc_go2:/workspace/src/robot_bringup/config/ros1/gbplanner/collab_qrc_go2:ro
    # Pre-step: Noetic-side relays + Noetic-native static TF re-publishers.
    #
    # KEY GOTCHA we hit on 2026-05-13: Humble publishes static TFs to
    # /robot/tf_static with TRANSIENT_LOCAL/latched durability. dynamic_bridge
    # (--bridge-all-topics) does NOT preserve latching — so by the time the
    # Noetic-side relay/subscribers come up, the latched message has already
    # been delivered to the bridge once and is gone. Result: Noetic /tf_static
    # has ZERO publishers, the TF chain world→map→odom→base_link→imu→body
    # breaks, elevation_mapping rejects every cloud (can't transform 'body'
    # frame to 'world'), gbplanner spams "No 'elevation' layer in map." at
    # multi-kHz until docker json.log fills /home.
    #
    # Fix: republish the static TFs INSIDE this container using the old
    # ROS 1 `tf` package's static_transform_publisher (NOT tf2_ros's), which
    # broadcasts to /tf at the requested period instead of latching once on
    # /tf_static. The high-rate channel naturally rides the regular dynamic
    # /tf bridge and reaches gbplanner/elevation_mapping reliably.
    #
    # The Humble-side static publishers (started by nav_test_gbplanner_demo3.sh)
    # are still useful for the Humble half of the stack (Nav2, CHAMP) but no
    # longer required for the Noetic half.
    command: >
      bash -c '
      source /opt/ros/noetic/setup.bash &&
      source /workspace/devel/setup.bash &&
      rosparam set /use_sim_time true &&
      rosrun topic_tools relay /robot/tf /tf &
      rosrun topic_tools relay /robot/tf_static /tf_static &
      rosrun topic_tools relay /robot/Odometry /rmf/odom &
      python3 /workspace/src/robot_bringup/config/ros1/gbplanner/collab_qrc_go2/cloud_stamp_rewriter.py &
      python3 /workspace/src/robot_bringup/config/ros1/gbplanner/collab_qrc_go2/publish_static_tfs.py &
      roslaunch robot_bringup gbplanner_sim.launch config_name:=collab_qrc_go2 ele_map_enable:=true rviz_en:=true
      '

  # --- ROS1↔ROS2 dynamic bridge (Humble Fast-LIO → Noetic gbplanner) ---
  # We use dynamic_bridge --bridge-all-topics (auto-discovers + bridges any
  # topic with matching subscriber on the other side) rather than
  # parameter_bridge because:
  #  1. parameter_bridge's YAML format does NOT support topic renames.
  #     For renames we'd need a separate ros1_launch_bridge_params service
  #     that calls `rosparam load` then runs parameter_bridge — overkill.
  #  2. We arranged the Noetic-side topic names (via gbplanner's launch
  #     args + CLI remaps above) to exactly match Humble's names, so
  #     no rename is needed; dynamic_bridge just passes through.
  ros2_launch_ros1_bridge:
    <<: [*system-template]
    image: unified_autonomy:ros2_ros1_bridge
    profiles: ["launch"]
    depends_on:
      ros1_launch_roscore:
        condition: service_healthy
    volumes:
      - ${UAS_REPO_ROOT}/workspaces/ws_ros1_bridge:/workspace:rw
    command: >
      bash -c '
      source /opt/ros/humble/setup.bash &&
      source /workspace/install/setup.bash 2>/dev/null || true &&
      ros2 run ros1_bridge dynamic_bridge --bridge-all-topics
      '
