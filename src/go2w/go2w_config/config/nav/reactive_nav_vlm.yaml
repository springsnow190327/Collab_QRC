/**:
  ros__parameters:
    # RRT*-based reactive navigation for VLM exploration.
    # Fast replanning, no recovery stack -- relies on RRT* to find paths.

    max_linear_speed: 0.70
    max_angular_speed: 0.85
    control_rate: 12.0
    startup_delay: 0.0
    goal_tolerance: 0.20
    goal_reached_replan_cooldown_sec: 1.0

    obstacle_slow_dist: 0.75
    obstacle_stop_dist: 0.35
    front_half_angle_deg: 35.0
    side_check_angle_deg: 60.0
    avoidance_gain: 1.0
    turn_in_place_on_block: true

    rrt_sample_count: 500
    rrt_step_size: 0.30
    rrt_goal_bias: 0.15
    rrt_rewire_radius: 0.60
    rrt_grid_radius: 4.0
    rrt_grid_resolution: 0.10
    # Iter 7: derived from URDF geometry rather than heuristic.
    #
    # reactive_nav_node inflates obstacles circularly around the LIDAR
    # ORIGIN (that's where the obstacle cloud is referenced). The inflation
    # radius must therefore be the worst-case distance from the LiDAR
    # optical frame to any point on the robot footprint, including wheels.
    #
    # TF chain (base_link → livox_mid360 origin):
    #   base → imu           (-0.02557, 0, 0.04232)   go2w.urdf.xacro
    #   imu  → livox_mid360  (+0.18700, 0, 0.08030)   livox_mid360.xacro
    #   LiDAR xy in base   = (+0.16143, 0)
    #
    # Robot footprint in base frame (from URDF + MJCF + wheel.stl):
    #   front   x : +0.340 m  (front sensor sphere: pos 0.293, r 0.047)
    #   rear    x : -0.279 m  (rear wheel centre -0.1934 - radius 0.086)
    #   lateral y : ±0.168 m  (hip 0.0465 + thigh 0.0955 + wheel
    #                           half-thickness 0.026)
    #
    # Distances from LiDAR (0.1614, 0) to each corner:
    #   front-left/right : 0.245 m
    #   rear-left/right  : 0.472 m  ← worst case
    #
    # Forward-mounted LiDAR makes the REAR corners the binding constraint.
    # 0.472 m geometric worst case + ~3 cm margin, rounded to 0.50.
    rrt_inflation_radius: 0.5
    rrt_replan_sec: 0.5
    rrt_informed_enabled: true
    rrt_goal_clip_distance: 3.5
    rrt_waypoint_lookahead: 0.50
    rrt_goal_search_radius: 1.5
    rrt_start_clearance_radius: 0.12
    rrt_unknown_is_obstacle: true

    global_downsample: 3
    # Iter 7: match rrt_inflation_radius so the global A* doesn't route
    # through corridors the local RRT* can't execute. See derivation in
    # the rrt_inflation_radius comment above.
    global_inflation_m: 0.5
    global_replan_sec: 3.0
    global_waypoint_spacing_m: 1.5
