[project]
name = "nvblox_torch"
description = "Pytorch interface for nvblox"

# Version is dynamically determined in setup.py
dynamic = ["version"]
dependencies = [
    "transforms3d>=0.4.2",
    "imageio>=2.35.0",
    "numpy",
    "open3d",
    "timm",
    "opencv-python",
    "einops",
    "nvtx",
    "scipy",
    # Note that the default pypi versions is locked to CUDA 12.
    # We therefore keep the version specifier open-ended in order to support externally installed versions.
    # 2.9.1 is the highest version currently supported.
    "torch<=2.9.1",
    "torchvision==0.*",
    "matplotlib>=3.7,<3.11",
    # Torch 2.3 require numpy 1.X
    "numpy>=1.24,<1.27"
]

[build-system]
requires = [
    "setuptools>=61.0"
]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["nvblox_torch*"]

[tool.pydocstyle]
convention = "google"
add-ignore = ["D100"]
# NOTE(dtingdahl) files to check are specified in .pre-commit-config.yaml
