basic:
  map_frame: "map"
  loop_update_hz: 2.0
  vis_hz: 1.0

keyframe:
  keyframe_threshold: 1.5
  # The upstream source has a typo in the parameter key lookup:
  # /keyframe/nusubmap_keyframes. Keep both spellings set.
  num_submap_keyframes: 5
  nusubmap_keyframes: 5

loop:
  loop_detection_radius: 3.0
  loop_detection_timediff_threshold: 30.0

icp:
  icp_voxel_resolution: 0.3
  icp_score_threshold: 0.15

result:
  save_voxel_resolution: 0.3
  save_map_pcd: false
  save_map_bag: false
  save_in_kitti_format: false
  seq_name: "scpgo_bridge"
