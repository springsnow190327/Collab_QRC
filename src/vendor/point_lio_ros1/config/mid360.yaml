# Point-LIO config for the Go2 rig — Livox Mid-360.
# Adapted from upstream config/avia.yaml + Mid-360 hint in the original
# comments + our FAST-LIO2 mid360 tuning (see
# Collab_QRC/src/vendor/fast_lio_ros1/config/mid360.yaml for rationale).
#
# Differences vs avia.yaml:
#   - scan_line:    6 → 4              (Mid-360 has 4 effective lines)
#   - timestamp_unit: 1 → 3             (Livox CustomMsg uses ns)
#   - blind:        0.5 → 0.20          (keep near-field returns for outdoor sparse)
#   - extrinsic_T:  avia value → mid360 measured ([-0.011, -0.02329, 0.04412])

common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    con_frame: false
    con_frame_num: 1
    cut_frame: false
    cut_frame_time_interval: 0.1
    time_diff_lidar_to_imu: 0.0

preprocess:
    lidar_type: 1                # Livox series
    scan_line: 4                 # Mid-360 effective scan lines
    timestamp_unit: 3            # 0=s, 1=ms, 2=us, 3=ns (CustomMsg uses ns)
    blind: 0.20

mapping:
    imu_en: true
    extrinsic_est_en: false      # Point-LIO docs: false for aggressive motion
    imu_time_inte: 0.005         # = 1 / 200 Hz IMU
    lidar_time_inte: 0.1         # = 1 / 10 Hz LiDAR
    satu_acc: 3.0                # Mid-360 IMU accel saturation (g)
    satu_gyro: 35                # Mid-360 IMU gyro saturation (rad/s)
    acc_norm: 1.0                # Mid-360 IMU reports g, not m/s²
    lidar_meas_cov: 0.01
    acc_cov_output: 500
    gyr_cov_output: 1000
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    imu_meas_acc_cov: 0.1
    imu_meas_omg_cov: 0.1
    gyr_cov_input: 0.01          # for IMU-as-input mode (we use output mode by default)
    acc_cov_input: 0.1
    plane_thr: 0.1
    match_s: 81
    ivox_grid_resolution: 2.0    # iVox cell size — KEY anti-degradation knob
    gravity: [0.0, 0.0, -9.810]
    gravity_init: [0.0, 0.0, -9.810]
    extrinsic_T: [-0.011, -0.02329, 0.04412]    # Mid-360 mount, measured 2026-04-17
    extrinsic_R: [1, 0, 0,
                  0, 1, 0,
                  0, 0, 1]

odometry:
    publish_odometry_without_downsample: false

publish:
    path_en: true                # /<ns>/path
    scan_publish_en: true        # /<ns>/cloud_registered + /<ns>/cloud_registered_body
    scan_bodyframe_pub_en: true  # also /<ns>/cloud_registered_body (gbplanner3 consumes this)

pcd_save:
    pcd_save_en: false           # do NOT write to SD on every run
    interval: -1
