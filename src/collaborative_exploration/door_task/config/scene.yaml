# Single source of truth for door-task scene geometry.
#
# Loaded by:
#   - door_task.yaml (button_monitor, door_monitor params)
#   - scripts/door_task_checker.py (success criteria)
#
# Keep in sync with src/go2w/go2_gazebo_sim/mujoco/two_rooms_door_scene.xml
# until the MJCF can be templated from this file directly.

scene:
  rooms:
    room_a:  { x_min: 0.0, x_max: 4.0, y_min: 0.0, y_max: 4.0 }
    room_b:  { x_min: 4.0, x_max: 8.0, y_min: 0.0, y_max: 4.0 }
    same_room_threshold_x: 4.0
    success_x_a_max: 3.5   # both robots strictly < this for room A success
    success_x_b_min: 4.5   # both robots strictly > this for room B success

  door:
    hinge_xy: [4.0, 2.5]
    width_m: 1.0
    open_threshold_rad: 1.2217   # 70 deg — required for success
    swings_into: room_b

  button:
    xy: [7.0, 2.0]
    press_radius_m: 0.5          # match button_monitor_node param

  robots:
    robot_a:
      start_xy: [2.0, 2.0]
      start_yaw_rad: 0.0
    robot_b:
      start_xy: [6.0, 2.0]
      start_yaw_rad: 0.0
