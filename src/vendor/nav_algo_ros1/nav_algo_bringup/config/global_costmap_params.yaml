global_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 1.0
  publish_frequency: 1.0
  rolling_window: false
  # Match the world-fixed 200×200 m grid Nav2 sim uses (trav grid origin
  # at -100, -100 / 0.10 m cells). The static_layer pulls width/height
  # from the incoming map message; these are fallbacks for first-tick.
  width: 200.0
  height: 200.0
  resolution: 0.10
  always_send_full_costmap: true
