/**:
  ros__parameters:
    # A* + pure-pursuit + curvature-aware speed shaping for Go2W.
    # Drop-in replacement for reactive_nav / mppi_nav; same I/O contract.
    #
    # Philosophy:
    #   - Straight stretches → full speed, wheels dominate (via hybrid_router)
    #   - Near goal        → brake smoothly to goal_slow_floor
    #   - Corners          → curvature_factor brings v down; sharp corners
    #                         bias into LEG mode so CHAMP can pivot in place
    #
    # Every number has a one-line comment — tune locally, re-launch.

    # ── speed / accel envelope ────────────────────────────────────
    # Go2W tipping constraint: high v with high ω induces lateral inertia
    # that tips the body (quadruped CoG is high vs wheel track). Keep these
    # conservative; straight speed up to 0.40 m/s, turning at 0.35 rad/s.
    max_linear_speed:    0.55    # m/s — was 0.40; CHAMP gait bumped to
                                 # 0.6 m/s so legged robot_b can reach
                                 # this cap. Wheel mode (robot_a Go2W)
                                 # has plenty of headroom.
    max_angular_speed:   0.50    # rad/s — conservative for Go2W stability
    min_linear_speed:    0.05    # m/s — creep floor when v_target > 0
    linear_accel_max:    0.40    # m/s²
    # Deceleration can be more aggressive than acceleration — the tipping
    # constraint is on high v·ω, not high |dv/dt|. 1.0 m/s² brakes
    # 0.55 → 0 in 0.55 s / 0.15 m distance, vs 1.375 s / 0.375 m at 0.4.
    # Matters for the "goal flips 180° behind robot" case: before, robot
    # spent 1.25 s walking forward while turning (arc radius 1.5→0.14 m)
    # and clipped corridor walls; now it brakes fast, then pivots in place.
    linear_decel_max:    1.00    # m/s² — used only when dv/dt < 0
    angular_accel_max:   2.00    # rad/s² — was 0.80, too slow to react to
                                 # cross-track corrections. Go2W wheel-diff
                                 # yaw has no inertia problem at this rate.

    control_rate:        20.0    # Hz
    startup_delay:       8.0     # s — let CHAMP stand-up AND octomap converge
                                 #     before any non-zero cmd_vel is issued.
                                 #     Early A* plans on sparse maps were
                                 #     routing through obstacles (demo1 divider).
    startup_ramp_sec:    3.0     # s — gentle ramp 0→1 after startup_delay

    # ── goal behaviour ────────────────────────────────────────────
    # Goal tolerance bumped 0.25 → 0.40 (2026-04-25). Tighter tolerance
    # forced A* to keep planning sub-0.4 m paths that pure-pursuit then
    # tried to track in 180° turns when goals flipped behind the robot,
    # producing 1 m of overshoot into walls. 0.40 m declares goal_reached
    # earlier so the short-path overshoot regime is skipped entirely.
    # Combined with min_path_length_to_track_m=0.40, any path shorter
    # than 0.4 m freezes the robot — both protections cover the same
    # failure mode from different angles.
    goal_tolerance:                       0.40    # m — within this: done
    goal_slow_radius:                     1.5     # m — begin braking
    goal_slow_floor:                      0.15    # m/s — min v in slow zone
    goal_reached_replan_cooldown_sec:     1.0
    # Hold zero cmd_vel for this many seconds after goal_reached
    # fires. Bleeds off CHAMP gait residual + body inertia so the
    # robot doesn't drift 0.5-1 m past the goal toward whatever
    # direction it was last walking. demo3_mixed 2026-04-25: A
    # racked up multiple back-to-back short-distance goals, each
    # firing goal_reached briefly; without this hold, residual
    # foot-cycle motion accumulated and pushed A into cross_h_e
    # where it climbed and tipped.
    goal_reached_brake_sec:               1.0

    # ── pivot-unsafe 3-tier recovery (replaces pivot_relief) ──────
    # Old pivot_relief open-loop strafed up to 0.5 m through clutter
    # and walked A into cross_h_w / zigzag_1 → tip-over (demo3_mixed
    # 2026-04-26). Replaced with brake-first / planned-backtrack /
    # surrender state machine.
    #
    # T1 BRAKE: most pivot_unsafe events are transient (peer crossing
    # halo, scan jitter). Braking 1.5 s lets them resolve without any
    # robot motion. Up to N retries → ~3 s budget on transients.
    pivot_recovery_t1_brake_sec:          1.5
    pivot_recovery_t1_max_attempts:       2
    # T2 BACKTRACK: drive low-speed toward a recent trajectory crumb.
    # 0.40 m back is far enough to clear most footprint snags but
    # short enough that we stay near the prior heading.
    pivot_recovery_backtrack_dist_m:      0.40
    pivot_recovery_backtrack_speed:       0.10
    # Breadcrumb trail config: stride=record-every-N-m, cap=total-m.
    # 2 m / 0.05 m = 40 crumbs ring buffer.
    pivot_recovery_trail_cap_m:           2.0
    pivot_recovery_trail_stride_m:        0.05
    # Arrival tolerance — stop T2 motion when this close to crumb.
    pivot_recovery_arrive_tol_m:          0.10

    # ── curvature shaping (core "slow in turns" logic) ────────────
    # Window is now MAX-κ over the lookahead (not avg) — one sharp turn
    # anywhere in window triggers slowdown. 20 segments × 0.10 m
    # resample_step = 2.0 m lookahead, enough braking distance up to
    # ~0.7 m/s with linear_accel_max=0.40 (v² / (2a) = 0.49 / 0.8 = 0.61 m).
    # Was 6 segments (0.6 m) — too short to see the second corner of a
    # back-to-back-90° turn, robot kept accelerating into it.
    curvature_lookahead_segments:  20    # segments — MAX |κ| over this window
    curv_full_speed_below:         0.25  # 1/m — κ below this: no slowdown
    curv_slow_above:               0.80  # 1/m — κ above this: factor_min (slow earlier)
    curv_factor_min:               0.40  # v-scale floor — was 0.50, lower for sharp κ

    # ── pure pursuit + cross-track correction ────────────────────
    # Shorter Ld reacts faster to curves and reduces corner-cutting.
    lookahead_min:    0.25   # m — at zero speed
    lookahead_max:    0.80   # m — at max speed
    lookahead_gain:   0.60   # Ld = clamp(Ld_min + gain·v, Ld_min, Ld_max)
    # Stanley-style cross-track gain. Blends with pure-pursuit
    # weight = clamp(|e_ct|/0.30, 0, 1) — on path: pure PP; 30 cm off: full Stanley.
    cross_track_gain: 0.70

    # ── reactive safety (scan) ────────────────────────────────────
    obstacle_slow_dist:      0.75
    obstacle_stop_dist:      0.35
    front_half_angle_deg:    35.0
    side_check_angle_deg:    60.0
    turn_in_place_on_block:  true

    # ── A* grid / map ─────────────────────────────────────────────
    map_topic:                ""      # empty → auto /{namespace}/map
    map_frame:                "map"
    map_occupied_thresh:      50
    global_downsample:        3       # coarsen 0.05 m grid to 0.15 m
    global_inflation_m:       0.25    # obstacle inflation — body half-WIDTH
                                      # (0.225 m) + small drift margin (0.025 m).
                                      # Setting this to body half-DIAGONAL
                                      # (0.40 m) is geometrically principled
                                      # ("free cells = body fits at any yaw")
                                      # but blocks demo3_mixed's tightest
                                      # corridor (sw_v_1↔sw_v_2 gap is 1.0 m;
                                      # 2 × 0.40 m halo + 0.45 m body =
                                      # 1.25 m needed → impassable). 0.25 m is
                                      # the empirical maximum where every
                                      # geometrically-passable corridor
                                      # remains A*-passable, while still
                                      # giving execution-drift headroom over
                                      # the prior 0.20 m which let A scuff
                                      # cross_h_e for 90 s in 2026-04-25 run.
                                      # Footprint validation (run on path
                                      # samples, not robot's actual drifted
                                      # pose) catches yaw-dependent clipping
                                      # that inflation alone misses.
    global_waypoint_spacing_m: 0.40   # finer than mppi (need κ)
    global_replan_sec:        1.5
    resample_step_m:          0.10    # uniform arc-length resample for pursuit

    # ── A* clearance cost shaping ────────────────────────────────
    # Bias the global plan toward corridor centrelines instead of
    # walls. Without it, equal-step-cost A* picks routes tangent to
    # the inflation halo identically to the corridor middle — under
    # any pose drift the body rectangle then clips. 2026-04-25
    # demo3_mixed: A* paths grazed zigzag_3 / cross_h_w / wall_west
    # within 0.15 m, body climbed walls when ω turned the rectangle
    # into the boundary.
    #
    # target_cells × cres = preferred clearance from any obstacle.
    # 4 × 0.15 m = 0.60 m → robot keeps ≥0.10 m of body buffer past
    # the inflation halo (inflation already absorbs body half-width).
    # weight is in step-cost units per missing-clearance cell:
    #   max penalty = weight × target = 0.5 × 4 = 2.0 per visited cell
    # That cleanly beats a 1-cell diagonal detour (1.414), so A* will
    # accept up to ~5 extra cells of detour in exchange for full
    # clearance over a 4-cell-long wall-grazing segment.
    astar_clearance_target_cells:  4
    astar_clearance_weight:        0.5

    # Short-path guard: pure-pursuit-tracking a path shorter than ~Ld
    # (lookahead) is unstable — when the goal is just behind the robot's
    # heading, lookahead clamps to the path end (= goal in body frame),
    # steering computes a 180° turn at high gain, body sweeps wide while
    # CHAMP gait residual carries it forward. Net: 1 m overshoot into
    # walls even though the path itself was geometrically safe.
    # 2026-04-25 demo3_mixed: A had a 0.26 m WEST path after a goal
    # flip, body swept SE 1 m, FL_wheel hit cross_h_e north face.
    # Below threshold, freeze and wait for next plan.
    min_path_length_to_track_m:    0.40

    # ── wheel ↔ legged mode dispatch ──────────────────────────────
    # Dispatch now uses HEADING ERROR (robot yaw vs path tangent) as the
    # primary signal, not just curvature. Rationale: legacy κ-only logic
    # only caught sharp path bends; in practice the robot also needs leg
    # mode whenever it's noticeably off-heading (e.g. after a correction)
    # so CHAMP's step-walking can absorb the yaw change gracefully.
    #
    # Plan B: v is NOT forced to 0 in leg mode. CHAMP walks at
    # `legs_mode_v_cap` while turning, avoiding the stop-rotate-go
    # cycle and the associated tipping risk.
    wheel_linear_threshold_for_bias:  0.18
    wheel_angular_threshold_for_bias: 0.30
    prefer_legs_when_curv_above:      0.90  # 1/m — secondary trigger (sharp κ)
    legs_bias_linear_max:             0.15  # legacy (unused in Plan B)
    legs_bias_angular_min:            0.35  # legacy (unused in Plan B)
    leg_heading_threshold_deg:        10.0  # |ψ_err| above this → legged
    legs_mode_v_cap:                  0.25  # m/s — walking speed during leg turn (was 0.15, robot_b too slow)
    # Tip-safe ω in leg mode. Lowered 0.45 → 0.35 after mixed-launch run
    # showed Go2W tipping during sustained ω=0.45 + walking. Still enough
    # to turn 90° in ~4.5s — navigation doesn't need faster.
    legs_mode_w_cap:                  0.35
    # Hard-gated legged-turn v policy (see astar_nav_node.cpp):
    #   |ψ_err| ≤ legs_pivot_above_deg → walk @ legs_mode_v_cap
    #   |ψ_err| >  legs_pivot_above_deg → pure pivot in place (v=0)
    # Fixes: the old "edge case" where ψ_err ≈ 180° walked forward at
    # 0.15 m/s while turning, driving the robot straight into the wall
    # opposite the goal. 30° picks a tight threshold so the robot
    # commits to aligning with the path before any forward motion.
    legs_pivot_above_deg:             30.0
    # Pivot/walk hysteresis. User requested STRICT alignment for
    # walk (2026-04-26): only walk when |ψ_err| ≤ 3°, pivot in all
    # other cases. Forces the robot to align very precisely with
    # the path tangent before any forward motion — eliminates the
    # "walk while turning into a wall" failure mode where even a
    # small ψ_err combined with forward motion produces a body
    # sweep that catches walls. Pivot is the SAFE default near
    # walls; walk only when geometry is clean.
    #   |ψ_err| ≥ 3° → pivot (v=0, ω≠0)
    #   |ψ_err| ≤ 1.5° → walk + turn
    #   1.5°-3° → keep current mode (commit window also applies)
    legs_pivot_enter_deg:             3.0
    legs_pivot_exit_deg:              1.5
    # Once a mode is entered, hold for at least this many seconds
    # before re-evaluating. CHAMP step cycle ≈ 0.5 s; mid-step mode
    # flips don't help. Suppresses the high-frequency residual that
    # hysteresis alone might miss when |ψ_err| oscillates fast.
    legs_mode_commit_sec:             0.5
    # Forward creep during pivot. CHAMP's gait library treats
    # (lin.x = 0, ω ≠ 0) as a stand request — Go2 (legged-only, mixed
    # launch) sat motionless even though astar was commanding ω = -0.35.
    # 0.05 m/s is enough to engage the trot so ω is actually executed;
    # at ω = 0.35 rad/s a 30° turn completes in ~1.5 s, robot drifts
    # ~7 cm during that window — well below corridor margins. Set 0.0
    # to revert to a hard pivot (only safe on Go2W where the hybrid
    # cmd router converts pure ω to a wheel differential).
    legs_pivot_v_floor:               0.05

    # ── trajectory display ────────────────────────────────────────
    # Full trip since boot (no truncation to last 100 s). Only append
    # a new trajectory sample when the robot has moved at least
    # `trajectory_min_step_m` since the previous one; cap total length
    # at `trajectory_max_points` so the Path publish stays cheap.
    trajectory_min_step_m:            0.02  # 2 cm between samples
    trajectory_max_points:            50000 # ≈ 1 km path at 2 cm step

    # ── Option B: oriented footprint validation ───────────────────
    # After A* returns a path, verify each pose along the resampled
    # path with the robot rectangle [L × W] at the path tangent
    # orientation. If any pose clips an occupied cell in the RAW
    # (uninflated) map, inject a small no-go disk at that pose and
    # re-plan. Disks persist for `footprint_nogo_ttl_sec` so the
    # planner remembers them across ticks without permanently
    # poisoning the route.
    #
    # Purpose: catches "point-passable, rectangle-not-passable"
    # paths — the failure mode where Go2W's 0.65 m long body hits
    # a wall while cornering even though the centre line of A*
    # stays in free space.
    # Bumped 0.65 → 0.85 (2026-04-26) after demo3_mixed dual-robot run
    # showed A's head_lower_collision climbing ne_div_h_west wall at
    # (15.00, 3.93) — body footprint cleared but the head extends
    # ~+0.15 m forward of base_link. astar planned a body-safe path
    # that was head-unsafe; A's head clipped the wall and tilt rose
    # to 56°. 0.85 = body 0.65 + head extension 0.15 + 0.05 safety
    # margin, applied symmetrically (centred on base_link). Rear
    # over-extension is harmless: Go2W reverse motion is rare and
    # short (T2 backtrack only ~0.4 m), and CHAMP's natural rear
    # clearance is already wider than the footprint.
    footprint_length:                 0.85   # m — body 0.65 + head 0.15 + buffer
    footprint_width:                  0.55   # m — Go2W full WHEEL-TO-WHEEL
                                              # extent. The chassis box is
                                              # 0.45 m wide, but the four
                                              # wheels mount on legs that
                                              # extend ~0.05 m beyond the
                                              # chassis on each side. We
                                              # model the body as the wheel
                                              # outer envelope — otherwise
                                              # validation thinks the body
                                              # is clear when wheel rims
                                              # are already touching the
                                              # wall (2026-04-26 cross_h_w
                                              # contact at y=-0.08, FR_wheel
                                              # touched while body box
                                              # validation still passed).
                                              # B (Go2 menagerie) keeps
                                              # 0.30 — the foot pads do not
                                              # protrude beyond the body
                                              # box, so width matches box.
    footprint_check_stride_m:         0.08   # m — sample step inside rect
    footprint_retry_disk_radius_m:    0.30   # m — nogo disk size
    footprint_max_retries:            4      # A* attempts per tick
    footprint_nogo_ttl_sec:          15.0    # s — disk memory window
    footprint_skip_near_robot_m:      0.50   # m — don't fault current pose
    # Self-pose immunity: idx=0 is robot's own pose, samples within this
    # distance are physically AT the robot. Their footprint clipping is
    # body_clip territory (handled by tick's CHAMP-strafe escape), not
    # a planning veto. Without this, A drifting 5–10 cm into an
    # inflation halo froze on every subsequent plan attempt.
    footprint_self_pose_skip_m:       0.10
    footprint_buffer_m:               0.12   # m — halo around rect during
                                              # validation. Drift + dynamic
                                              # accumulation in legged gait +
                                              # pure-pursuit overshoot is
                                              # closer to 0.10-0.15 m than
                                              # the 0.05 m we initially
                                              # estimated. 0.12 gives the
                                              # body 0.69×0.89 effective
                                              # footprint during validation
                                              # — paths within 0.12 m of any
                                              # wall surface fail and force
                                              # A* to retry farther out.
                                              # Corridors ≥ 0.69 m wide
                                              # remain passable (sw_v_1↔
                                              # sw_v_2 = 1.0 m: 0.155 m
                                              # safety each side after body).

    # ── topics ────────────────────────────────────────────────────
    frontier_replan_topic: "/frontier_replan"
    stop_topic:            "/stop"
