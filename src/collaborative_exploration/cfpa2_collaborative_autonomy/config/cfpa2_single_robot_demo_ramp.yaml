# CFPA2 yaml overlay for the demo_ramp scene.
#
# Loaded on top of cfpa2_single_robot.yaml; only the keys here are changed,
# everything else inherits from base. Used by
# scripts/launch/nav_test_3d_explore.sh via nav_test_3d_explore.launch.py
# (cfpa2_config_overlay arg).
#
# Rationale: the base config's frontier-filter trio was tuned for open /
# outdoor scenes:
#   cfpa2_frontier_obstacle_clearance_m: 0.35  (4 cells @ 0.10 m res)
#   cfpa2_frontier_unknown_check_radius_m: 0.40 (4-cell-radius window)
#   cfpa2_frontier_min_unknown_cells: 20
#
# demo_ramp has a ~2 m wide corridor flanked by lethal walls. The 4-cell
# clearance disk picks up the side wall from anywhere inside the corridor;
# the 4-cell unknown-check window picks up the same wall, so the
# "live unknown" count (unknowns whose 8-neighbours contain NO occupied)
# drops to ~0 → every corridor frontier was silently rejected and CFPA2
# reported `no_frontiers` indefinitely.
#
# These overrides match the geometric scale of the scene: 0.20 m clearance
# is still wider than half the Go2W base, and 5 live unknowns is plenty to
# distinguish "real frontier of large open region" from "noise near a wall".

/**:
  ros__parameters:
    # 2026-05-17: switched from /traversability_grid → /global_costmap/costmap.
    # The raw trav grid has no inflation; CFPA2's BFS thought the robot could
    # squeeze through cells Nav2's footprint-aware inflation actually rejects
    # → 33% Nav2 ABORTED churn (16 BL events for 8 successes in 13 min).
    # Reading Nav2's inflated costmap aligns CFPA2's "reachable" with Nav2's
    # "plannable" so picked goals are immediately path-able.
    planning_map_topic_suffix: /global_costmap/costmap
    ig_dimension: 2d
    cfpa2_frontier_min_cluster_area_m2: 0.04
    # Down from 0.20 → 0.10 (1 cell @ 0.10m res). Narrow corridors in slam_ops2
    # are 0.30-0.50m wide; with 2-cell clearance the centroid was within range
    # of side walls → every corridor frontier was rejected, status flipped to
    # no_reachable despite a clear topological path existing.
    cfpa2_frontier_obstacle_clearance_m: 0.10
    cfpa2_frontier_unknown_check_radius_m: 0.30
    cfpa2_frontier_min_unknown_cells: 5
    # /traversability_grid is a Nav2-style costmap: 50-99 is expensive but
    # traversable, 100 is lethal. Keep frontier wall clearance conservative,
    # but let CFPA2 reachability traverse nonlethal graded costs.
    # Nav2 publishes the costmap with these value semantics:
    #   0   = free
    #   1-98 = inflation gradient (passable but costly)
    #   99  = INSCRIBED_INFLATED — robot footprint physically cannot fit
    #   100 = lethal
    #   -1  = unknown
    # 99 blocks BFS too (otherwise CFPA2 still considers cells the robot
    # can't physically fit through as "reachable" → Nav2 ABORTs again).
    cfpa2_reachability_occ_threshold: 99
    # Loosen frontier extraction's "occupied" definition. With planning_map
    # = /global_costmap/costmap, anything ≥50 is inflation gradient — treating
    # all of that as "occupied" leaves only a 1-2 cell ring of "free" between
    # observed and unknown → frontier candidates collapse to ~robot pose →
    # CFPA2 picks own location as goal in a 12s BL loop.
    # 99 = INSCRIBED_INFLATED; only robot-footprint-impossible cells are
    # "occupied" for frontier purposes, so the inflation gradient becomes
    # usable workspace.
    occupancy_block_threshold: 99
    # SmacPlanner is launched with allow_unknown=true for exploration. Match
    # that reachability model so CFPA2 can hand Nav2 boundary frontiers instead
    # of stalling when the elevation map has sparse unknown gaps.
    cfpa2_reachability_allow_unknown: true
    # The "stay-local" goal-distance cap (2.5 m default) is too tight for
    # this 24 m arena: the robot maps everything within 2.5 m to free, then
    # the next frontier ring is 3–6 m out → _goal_too_far drops them all
    # and the status flips to no_frontiers despite ~200 valid frontier
    # candidates existing further out. Raise to 15 m so the planner can
    # chase distant rings; CFPA2's utility (info_gain − α·distance) still
    # prefers near goals when they exist.
    # slam_ops2 is 80×32 m; 15 m was too tight (robot frequently saw all
    # near frontiers exhausted before the next reachable ring). 50 m
    # comfortably covers the whole scene.
    cfpa2_max_goal_distance_m: 50.0
    # Floodfill IG: replaces the local-square unknown-cell count with a
    # connected-component BFS from each frontier. Small nooks saturate well
    # below the 2000-cell budget; large rooms / corridors hit the cap → utility
    # now reflects geometric room size rather than local unknown density. Fixes
    # the slam_ops2 behaviour where the robot kept picking small nearby nooks
    # over big-but-farther rooms.
    # Planner mode: TSP-of-top-K beats greedy max-utility on slam_ops2's
    # multi-room layout. Greedy was flipping between a near-small frontier
    # and a far-big one every tick (sawtooth motion → churn). TSP picks
    # the head of the nearest-neighbor tour through the top-K candidates,
    # which is "the frontier on the route to the big payoff", and across
    # ticks the tour stays stable so commit naturally works.
    cfpa2_planner_mode: "tsp_topk"
    cfpa2_tsp_k: 5
    cfpa2_ig_mode: "floodfill"
    cfpa2_floodfill_budget: 2000
    cfpa2_floodfill_max_radius_cells: 100
    # Sensor-derived bridge goal for ramps: when slope/traversability/step
    # layers prove a local ramp patch is traversable, CFPA2 may temporarily
    # target that viewpoint so the robot climbs high enough to observe the
    # upper platform. No scene-coordinate corridor is used here.
    ramp_ascent_enabled: true
    ramp_ascent_goal_topic_suffix: /ramp_ascent_goal
    ramp_ascent_goal_stale_sec: 3.0
    ramp_ascent_max_goal_distance_m: 3.0
    ramp_ascent_require_grid_reachable: true
    ramp_ascent_reachability_occ_threshold: 100
    ramp_ascent_exclusive: true
    ramp_ascent_ignore_blacklist: false
    ramp_ascent_switch_min_dist_m: 0.25
    startup_delay_sec: 24.0
