  # Configurations for the exploration pipeline.
  # For more details, please check comments in the params.h file and the wiki.
  #-------------------------------------------------------------------------------
  # ROBOT CONFIGURATION
  #-------------------------------------------------------------------------------
RobotParams:
  # Use GBPlanner3's native aerial/free-space collision model for the high-level
  # exploration planner.  The MuJoCo/Go2 execution stack remains ground-based:
  # only x/y/yaw waypoints are passed to Nav2 MPPI, whose costmap + safety
  # shield keep the real robot dynamics and collision checking unchanged.
  #
  # The upstream kGroundRobot mode depends on a dense elevation_map layer.  In
  # this flat MuJoCo maze the Mid-360-style point cloud gives reliable wall
  # surfaces but sparse floor elevation, so the ground-mode sampler repeatedly
  # rejects every vertex before GBPlanner3 can produce an autonomous path.
  type:               kAerialRobot
  # High-level exploration validity model. The common executor's Nav2 MPPI
  # costmap + safety shield handle the real Go2 footprint at execution time;
  # GBPlanner3 only proposes x/y/yaw exploration targets. Keep this compact,
  # but not a point robot: over-compressing the box and lifting the center to
  # the sensor plane made the TSDF free-space check sample mostly unknown wall
  # voxels in the demo3 maze.
  size:               [0.30, 0.22, 0.10]
  size_extension_min: [0.0, 0.0, 0.0]
  size_extension:     [0.0, 0.0, 0.0]
  # The ROS1 common-executor wrapper projects odometry onto a common SE(2)
  # planning layer before it reaches GBPlanner3.  Keep the GBPlanner3 box
  # centered on that planning layer; adding another z offset moves the
  # collision samples into sparse wall-volume voxels and collapses RRG growth.
  center_offset:      [0.0, 0.0, 0.0]
  relax_ratio:        0.5
  bound_mode:         kExtendedBound
  # Tighter than smb_arl (0.5/2.0/0.05) — Go2 is a smaller footprint.
  safety_extension:   [0.02, 0.02, 0.01]
#-------------------------------------------------------------------------------
# SENSOR CONFIGURATION
#  sensor_list: Define a set of sensors relevant to the exploration task.
#  rotations: ZYX order;
#             all follows ROS convention (X-forward, Y-left, Z-Up).
#-------------------------------------------------------------------------------
SensorParams:
  sensor_list:      ["OS064", "Cam", "CamExp"]
  OS064:
    type:           kLidar
    max_range:      20
    center_offset:  [0.0, 0.0, 0.0]
    rotations:      [0.0, 0.0, 0.0]
    fov:            [rad(2*pi), rad(90*pi/180)]
    resolution:     [rad(10.0*pi/180), rad(10.0*pi/180)]
    frontier_percentage_threshold: 0.05
  CamF:
    type:           kLidar
    max_range:      3.5
    center_offset:  [0.0, 0.0, 0.0]
    rotations:      [0.0, 0.0, 0.0]
    fov:            [rad(100*pi/180), rad(60*pi/180)]
    resolution:     [rad(4.0*pi/180), rad(4.0*pi/180)]
    frontier_percentage_threshold: 0.01
  Cam:
    type:           kLidar
    CameraType:     kRotating
    rot_lims:       [rad(-80*pi/180.0), rad(80*pi/180.0)]
    max_range:      2.0 #2.5
    min_range:      0.25
    center_offset:  [0.0, 0.0, 0.0]
    rotations:      [0.0, 0.0, 0.0]
    fov:            [rad(80*pi/180.0), rad(60*pi/180.0)]
    # resolution:     [rad(5.0*pi/180), rad(5.0*pi/180)]
    # resolution:     [rad(2.0*pi/180), rad(2.0*pi/180)]
    resolution:     [rad(5.0*pi/180), rad(5.0*pi/180)]
    frontier_percentage_threshold: 0.06
  CamExp:
    type:           kLidar
    CameraType:     kRotating
    rot_lims:       [-1.57, 1.57]
    max_range:      5.0
    min_range:      0.25
    center_offset:  [0.0, 0.0, 0.0]
    rotations:      [0.0, 0.0, 0.0]
    fov:            [rad(84*pi/180.0), rad(64*pi/180.0)]
    # resolution:     [rad(5.0*pi/180), rad(5.0*pi/180)]
    # resolution:     [rad(2.0*pi/180), rad(2.0*pi/180)]
    resolution:     [rad(7.0*pi/180), rad(7.0*pi/180)]
    frontier_percentage_threshold: 0.06

CameraAnnotationParams:
  sensor_list:      ["Cam"]
  Cam:
    type:           kLidar
    # rot_lims:       [-1.57, 1.57]
    rot_lims:       [-1.55, 1.55]
    max_range:      2.0 #2.5
    center_offset:  [0.0, 0.0, 0.0]
    rotations:      [0.0, 0.0, 0.0]
    fov:            [rad(84*pi/180.0), rad(64*pi/180.0)]
    resolution:     [rad(2.0*pi/180), rad(2.0*pi/180)]
    frontier_percentage_threshold: 0.01
#-------------------------------------------------------------------------------
# SAMPLING SPACE CONFIGURATION
#   Global: Strictly defined bounds for the whole environment.
#   Local: Define a local space wrt current robot state for planning.
#-------------------------------------------------------------------------------
BoundedSpaceParams:
  Global:
    type:           kCuboid
    # min_val:        [-6.0, -12.0, -0.5]
    # max_val:        [6.0, 2.0, 11.5]
    min_val:        [-1000.0, -1000.0, -50.5]
    max_val:        [1000.0, 1000.0, 2.0]
    # min_val:        [-2.0, -30.0, -1.0]
    # max_val:        [30.0, 30.0, 15.0]
    # min_val:        [10.0, -25.0, 1.0]
    # max_val:        [70.0, 35.0, 8.0]
  Local:
    type:           kCuboid
    # min_val:        [-7.5, -7.5, -7.0]
    # max_val:        [7.5, 7.5, 7.0]
    # min_val:        [-10.0, -10.0, -0.5]
    # max_val:        [10.0, 10.0, 0.5]
    # Keep the local RRG window close to the demo3-style maze scale.  The
    # upstream UGV config uses a 40x40x4 m window; with dual ROS1 bridges and
    # MuJoCo this made each GBPlanner3 planning call exceed a 90 s smoke run.
    min_val:        [-10.0, -8.0, 0.05]
    max_val:        [10.0, 8.0, 0.45]
    # min_val:        [-20.0, -20.0, -4.0]
    # max_val:        [20.0, 20.0, 4.0]
    # min_val:        [-10.0, -10.0, -4.0]
    # max_val:        [10.0, 10.0, 4.0]
    min_extension:  [-10.0, -8.0, -1.0]
    max_extension:  [10.0, 8.0, 1.0]
  LocalSearch:
    type:           kCuboid
    min_val:        [-12.0, -10.0, 0.00]
    max_val:        [12.0, 10.0, 0.55]
  # Adaptive OBB:
  LocalAdaptiveExp:
    type:           kCuboid
    min_val:        [-10.0, -10.0, -0.5]
    max_val:        [10.0, 10.0, 0.5]
NoGainZones:
  g1:  # Back
    type:           kCuboid
    min_val:        [-50.0, -10.0, -10.0]
    max_val:        [2.0, 10.0, 10.0]
#-------------------------------------------------------------------------------
# SAMPLING POLICY CONFIGURATION
#   Sample space limited to 4 states: X, Y, Z, and Heading
#-------------------------------------------------------------------------------
RandomSamplerParams:
  SamplerForExploration:
    X:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Y:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Z:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Heading:
      pdf_type:       kUniform
      sample_mode:    kManual
      min_val:        rad(-pi)
      max_val:        rad(pi)
    Pitch:
      # pdf_type:       kUniform
      # sample_mode:    kManual
      # min_val:        rad(-pi/2)
      # max_val:        rad(pi/2)
      pdf_type:       kConst
      sample_mode:    kManual
      const_val:      0.0
  SamplerForSearching:
    X:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Y:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Z:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Heading:
      pdf_type:       kUniform
      sample_mode:    kManual
      min_val:        rad(-pi)
      max_val:        rad(pi)
    Pitch:
      # pdf_type:       kUniform
      # sample_mode:    kManual
      # min_val:        rad(-pi/2)
      # max_val:        rad(pi/2)
      pdf_type:       kConst
      sample_mode:    kManual
      const_val:      0.0
  SamplerForAdaptiveExp:
    X:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Y:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Z:
      pdf_type:       kUniform
      sample_mode:    kLocal
    Heading:
      pdf_type:       kUniform
      sample_mode:    kManual
      min_val:        rad(-pi)
      max_val:        rad(pi)
    Pitch:
      # pdf_type:       kUniform
      # sample_mode:    kManual
      # min_val:        rad(-pi/2)
      # max_val:        rad(pi/2)
      pdf_type:       kConst
      sample_mode:    kManual
      const_val:      0.0

#-------------------------------------------------------------------------------
# EXPLORATION CONFIGURATION
# exp_sensor_list: sensors used to compute exploration gain.
#-------------------------------------------------------------------------------
PlanningParams:
  type:             kBasicExploration #kAdaptiveExploration, kBasicExploration
  rr_mode:          kGraph
  graph_building_mode: kBasic
  exp_sensor_list:  ["OS064"]
  # exp_sensor_list:  ["CamExp"]
  # exp_sensor_list:  ["CamF"]
  inspection_sensor_list:  ["Cam"]
  # no_gain_zones_list: ["g1"]
  v_max:            1.0 # max velocity m/s
  v_homing_max:     0.9 # max velocity m/s
  yaw_rate_max:     0.9 # max angular velocity rad/s
  yaw_tangent_correction: false # If true - all headings will be along the path segment
  edge_length_min:  0.2
  edge_length_max:  4.0
  edge_overshoot:   0.0 # m - Account for possible tracking error by collision checking on an extended edge
  num_vertices_max: 160 # graph building stops if these many vertices are added
  num_edges_max:    4000 # graph building stops if these many edges are added
  num_loops_cutoff: 700 # Maximum iterations in which no vertices or edges are added to the graph
  num_loops_max:    4000 # Maximum iterations possible for graph building
  nearest_range:    4.0 # The max range within which a new vertex can be connected to an existing vertex
  nearest_range_min: 0.2 # >= edge_length_min
  nearest_range_max: 4.0 # <= edge_length_max
  use_current_state: true # If true, it will use the current state to plan from instead of the state provided by the PCI in the service call
  use_ray_model_for_volumetric_gain: true # if false, will check voxel by voxel in the sensor frustum 
  exp_gain_voxel_size: 0.8 # used if use_ray_model_for_volumetric_gain is false
  # Gains:
  path_length_penalty: 0.01 # 0.4
  path_direction_penalty: 0.03 # 0.01
  allow_sudden_dir_change: true
  occupied_voxel_gain: 0.0
  free_voxel_gain:  1.0 # prefer directions towards more free voxels in case of the dead-end
  unknown_voxel_gain: 60.0
  global_graph_odom_dist: 1.0
  # In common-executor benchmarking, a sub-meter "closest frontier" is often
  # inside Nav2's goal tolerance and becomes a no-op.  Use GBPlanner3's native
  # volumetric information gain so the high-level planner selects real
  # exploratory branches while Nav2 still owns local execution.
  select_closest_frontier: false

  traverse_length_max: 5.0 # Maximum length of the best path will be truncated to for actual traversal
  traverse_time_max: 5000.0
  path_safety_enhance_enable: false
  augment_free_voxels_time: 3
  free_frustum_before_planning: false
  freespace_cloud_enable: false
  leafs_only_for_volumetric_gain: true # Whether to calculate gain of the entire path or only the leaf nodes
  cluster_vertices_for_gain: false
  clustering_radius: 0.5
  path_interpolation_distance: -1.0 # 0.5

  max_ground_height: 0.45 # Go2 common-executor planning layer above the local floor
  robot_height: 0.45  # Height used by GBPlanner3's high-level validity model
  max_inclination: rad(20.0*pi/180)
  
  time_budget_limit: 5000 # seconds
  auto_homing_enable: false
  go_home_if_fully_explored: false

  nonuniform_ray_cast: false
  ray_cast_step_size_multiplier: 1.0

  use_camera_gain: false
  annotate_map_with_camera: true
  
  inspection_planning: false

  keep_leaf_yaw_only: true

  enable_opening_traversal: false
  opening_alignment_z_offset: 0.0 # -0.25
  only_opening_traversal: false

  auto_opening_path_approval: true
  max_opening_height: 20.0

  # Use single-point ESDF checks for sampled vertices and direct ESDF checks
  # for edges.  The previous full-box voxel check rejects nearly all samples in
  # the MuJoCo/Fast-LIO maze because sparse floor/self returns keep the start
  # volume partially unknown; Nav2 MPPI + safety shield still enforce the real
  # Go2 execution footprint.
  box_check_method: 1
  line_check_method: 2

  add_only_frontiers_to_global_graph: true

  local_navigation_reaching_radius: 3.0
  active_homing_update_radius: 7.0

  min_coverage_percentage: 0.9
  inspection_xy_spacing: 1.0 # 1.5
  inspection_z_spacing: 0.5 # 2.0
  inspection_thr_esdf_dist: 0.75 # 1.5
  inspection_target_viewing_range: 1.5 #1.5 # 2.5
  inspection_graph_vertices: 500
  max_inspection_vertices: 100
  #: 10

  max_surface_distance: 1.5
  limit_vertices_to_surface: false
  min_occ_surface: 0.0

  max_exploration_iterations: 5
  exploration_only: false
  # compartment_centers: [2.0, 0.25, 2.0, 6.0, 0.25, 2.0, 10.0, 0.25, 2.0, 14.0, 0.25, 2.0]
  # compartment_dimensions:
  #   type:           kCuboid
  #   min_val:        [-2.4, -1.9, -2.0]
  #   max_val:        [2.4, 1.9, 2.0]
  
  # demo3_mixed and generated benchmark mazes share a 24 m x 16 m world
  # envelope.  The upstream BWT compartment centered at (0, -5) clipped
  # robot_a at y~=2.0 onto the compartment boundary, so GBPlanner3 could not
  # grow a local graph for that robot.  This bounds the full benchmark maze
  # instead of a route or a robot-specific corridor.
  compartment_centers: [12.0, 0.0, 1.0]
  compartment_dimensions:
    type:           kCuboid
    min_val:        [-12.5, -8.5, -1.5]
    max_val:        [12.5, 8.5, 2.0]
  # Chem plant
  # compartment_centers: [1.0, 2.0, 2.5]
  # compartment_dimensions:
  #   type:           kCuboid
  #   min_val:        [-4.0, -5.0, -3.0]
  #   max_val:        [4.0, 5.0, 3.0]

  # compartment_centers: [0.0, 0.0, 2.25]
  # compartment_centers: [0.0, 0.0, 1.2]
  # compartment_dimensions:
  #   type:           kCuboid
  #   min_val:        [-3.0, -10.0, -1.8]
  #   max_val:        [17.0, 10.0, 2.25]
  # compartment_dimensions:
  #   type:           kCuboid
  #   min_val:        [-2.5, -2.5, -2.5]
  #   max_val:        [2.5, 2.5, 2.5]
  
  # If inspection_planning is true, the following is set:
  # use_camera_gain = true
  # yaw_tangent_correction = false
  # leafs_only_for_volumetric_gain = false
  # cluster_vertices_for_gain = false
  # path_safety_enhance_enable = false
  # annotate_map_with_camera = true

  geofence_checking_enable: true

AdaptiveObbParams:
  type: kPca
  local_pointcloud_range: 50.0
  bounding_box_size_max: 35
