# Nav2 full-stack config for Go2W (single robot scaffold).
# Plugins: SmacPlannerHybrid (REEDS_SHEPP) + DWB local planner with
# polygon footprint + behavior_server + lifecycle_manager.
#
# Why this stack:
#   - SmacPlannerHybrid uses (x, y, θ) state space + ReedsShepp shots,
#     plans through narrow corridors that disk-inflation A* cannot.
#   - DWB samples velocity space, simulates each candidate over a short
#     horizon, validates oriented footprint at every sample, picks the
#     best. Zero "pure-pursuit overshoot" because there's no path-tracker
#     loop — controller searches velocities directly.
#   - Polygon footprint (0.65 × 0.45 m rectangle) replaces the disk
#     inflation that broke our previous A* plans.
#
# Topics this config assumes:
#   /robot_a/map               (OccupancyGrid from octomap_server)
#   /robot_a/odom/nav          (from slam_odom_relay, → "odom" via remap)
#   /robot_a/scan_3d           (from pointcloud_to_laserscan)
#   /tf, /tf_static            (namespaced via launch remap)

# ============================================================
# COSTMAPS
# ============================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # 2026-04-28: switched from robot_radius=0.40 (16-pt circle approx)
      # to a real rectangular polygon. Value 0.70 × 0.40 m (corners at
      # ±0.35, ±0.20) matches what `nav2_params_sim.yaml` already used —
      # only verified value in the repo. Physical meaning: wheelbase
      # 0.387 m + ~0.16 m sensor/tail buffer (front+rear); track 0.284 m
      # + ~0.06 m leg-swing buffer (per side). With consider_footprint=
      # true on the MPPI ObstaclesCritic, the controller checks the
      # *rotated rectangle* per predicted pose instead of a 0.40 m
      # circle. demo3_mixed 0.425 m corridor: axis-aligned body has
      # 0.125 m clearance/side; circle approximation had 0 → MPPI always
      # rejected → "stamping" failure.
      footprint: "[[0.35, 0.20], [0.35, -0.20], [-0.35, -0.20], [-0.35, 0.20]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /robot_a/scan_3d
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          obstacle_max_range: 5.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Body diagonal = √(0.325² + 0.225²) ≈ 0.40 m. Inflation must be
        # ≥ this so MPPI's cost field rejects trajectories that pass the
        # body's CENTER within 0.45 m of an obstacle — at any yaw the
        # rotated-rectangle body would clip. demo3_mixed sw_v_2 corridor
        # 2026-04-28: with 0.30 m inflation, SmacHybrid path centerline
        # ran along x=5.0 (the wall), body half-width 0.225 m put the
        # FL wheel at x=5.225 — INSIDE sw_v_2. MPPI followed the path
        # exactly into the wall.
        inflation_radius: 0.45
        cost_scaling_factor: 5.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # See local_costmap footprint comment above. Same rectangle for global.
      footprint: "[[0.35, 0.20], [0.35, -0.20], [-0.35, -0.20], [-0.35, 0.20]]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        # Subscribe to our octomap-published /robot_a/map.
        map_topic: /robot_a/map
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Body half-width 0.225 m. Inflation 0.30 m gives the planner a
        # small comfort margin; SmacHybrid's own footprint check during
        # search is the real safety guarantee.
        inflation_radius: 0.30
        cost_scaling_factor: 5.0
      always_send_full_costmap: true

# ============================================================
# PLANNER SERVER (SmacPlannerHybrid, REEDS_SHEPP)
# ============================================================
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.4
      allow_unknown: true
      max_iterations: 1000000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"   # supports forward + reverse
      angle_quantization_bins: 36              # 10° bins
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      # Tight turning radius so the planner can plan sharp turns. Go2W
      # skid-steer can essentially pivot in place; 0.30 m approximates
      # this in a Reeds-Shepp formalism (true 0 is degenerate).
      minimum_turning_radius: 0.30
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ============================================================
# CONTROLLER SERVER (DWB with oriented footprint check)
# ============================================================
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 12.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # Tolerances reflect "frontier-goal" semantics: the goal is a
      # frontier centroid, not a precise pose. The strict yaw check
      # (0.50 rad ≈ 28°) was the real blocker — cfpa2_to_nav2_bridge
      # synthesizes goal yaw via atan2(goal-robot); near the goal that
      # vector swings wildly under tiny robot motions, so MPPI
      # (no-strafe diff-drive primitives) can't latch success → robot
      # parks ~0.3 m short and stuck_watchdog eventually backs it up.
      # 3.14 rad ≈ disabled = correct for frontier reaching. xy bumped
      # to 0.50 for a small extra slack against trav_grid sparsity
      # (cells right at the frontier centroid can be UNKNOWN).
      xy_goal_tolerance: 0.50
      yaw_goal_tolerance: 3.14
      stateful: true
    FollowPath:
      # 2026-05-19 CUDA-MPPI: drop-in subclass of nav2_mppi_controller::
      # MPPIController. When `use_cuda: true`, the per-iteration MPPI body
      # (generateNoisedTrajectories + evalTrajectoriesScores +
      # updateControlSequence) runs on the GPU via the nav_algo_mppi_cuda
      # backend. When `use_cuda: false`, the upstream xtensor CPU path runs
      # unchanged (graceful fallback when no GPU is present).
      plugin: "nav2_mppi_controller_cuda_plugin::CudaMPPIController"
      use_cuda: true
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.20
      vy_std: 0.20
      wz_std: 0.40
      vx_max: 0.50
      vx_min: -0.20      # allow brief reverse for tight maneuvers
      vy_max: 0.0        # diff-drive — no strafe in routing layer
      wz_max: 1.0
      ax_max: 0.5
      ax_min: -0.6
      ay_max: 0.0
      az_max: 1.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstrains:
        min_turning_r: 0.3
      critics:
        - "ConstraintCritic"
        - "ObstaclesCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        # 2026-04-28: enabled. Tested on humble 1.1.20 — the prior
        # "throws at configure-time" comment turned out to be a polygon-
        # parsing fail when the yaml used `robot_radius:`; with a real
        # `footprint:` polygon param on both costmaps, MPPI reads a 4-pt
        # rectangle at configure and FootprintCollisionChecker initialises
        # cleanly. Effective rejection envelope is now the *rotated body*
        # (0.65 × 0.45 m) plus collision_margin_distance, instead of a
        # 0.40 m circle + 0.20 m margin. Lets the robot commit to 0.42 m
        # corridors that the planner can already plan.
        consider_footprint: true
        collision_cost: 10000.0
        # Tight margin once consider_footprint is on — MPPI already does the
        # rotated-polygon check; this is just a 3 cm safety pad against
        # discretisation/jitter.
        collision_margin_distance: 0.03
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.2
        mode: 0

# ============================================================
# BEHAVIOR SERVER (recovery primitives)
# ============================================================
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.5

# ============================================================
# BT NAVIGATOR (orchestrates planner + controller + behaviors)
# ============================================================
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /robot_a/odom/nav
    bt_loop_duration: 10
    default_server_timeout: 20
    # Use Nav2's bundled default behaviour tree.
    # Absolute path — nav2 yaml does NOT resolve $(find-pkg-share ...).
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    # Full default Nav2 BT plugin set — matches nav2_params.yaml. Trimming
    # individual plugins triggers "Node not recognized" errors when the
    # bundled XML behaviour trees reference any missing plugin.
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# ============================================================
# LIFECYCLE MANAGER (brings all nav2 servers up)
# ============================================================
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 0.0
    node_names:
      - "controller_server"
      - "planner_server"
      - "behavior_server"
      - "bt_navigator"
