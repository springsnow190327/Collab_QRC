/**:
  ros__parameters:
    robot_namespace: robot
    namespaces: [robot]
    algorithm_mode: cfpa2
    publish_rate: 2.0
    output_mode: waypoint_coord
    # Set true to restore the previous loud throttled debug logs (every
    # ~2 s, full per-ns target/utility/distance dumps). Default false:
    # only state-change INFO lines come through, leaving exploration_metrics_logger
    # to emit the structured event stream.
    verbose_logs: false
    tare_goal_topic_suffix: /way_point_tare
    relocation_goal_topic_suffix: /goal_point
    grid_world_status_topic_suffix: /grid_world_status
    use_shared_map: false
    shared_map_topic: /disco_slam/global_map
    shared_map_wait_sec: 8.0
    shared_map_local_patch_radius_m: 2.5
    goal_topic_suffix: /way_point_coord
    # 2026-05-05: switch CFPA2's planning_map source from /robot/map (raw
    # octomap projection) to /robot/global_costmap/costmap (Nav2's inflated
    # global costmap). The BFS in _distance_transform now walks the same
    # cost field SmacPlannerLattice plans against, so any frontier CFPA2
    # marks "reachable" is one Nav2 can actually path to. Cells in the
    # inflation gradient (cost ≥ occ_thresh=50) get rejected — no more
    # picking goals that look topologically reachable but lie in a wall's
    # inflation halo.
    # Caveats:
    #   - global_costmap appears AFTER Nav2 lifecycle activates (~2 s);
    #     CFPA2's "Waiting for map topic" warning will fire briefly at boot.
    #   - global_costmap mirrors /robot/map's coverage (StaticLayer source),
    #     so frontier visibility area is unchanged.
    planning_map_topic_suffix: /global_costmap/costmap
    marker_frame_override: map
    frontier_stride: 2
    max_targets: 180
    # Stable-challenger override (2026-05-09): lets a freshly-seen better
    # frontier preempt a held goal mid-flight. Anti-jitter via consecutive
    # top-1 streak; anti-marginal via score-improvement factor. Bypasses
    # goal_lock_sec but respects its own min_lock_age. Set streak_required=0
    # to revert to legacy commit-and-hold behavior.
    cfpa2_challenger_streak_required: 3        # ticks (≈1.5s @ 2Hz)
    cfpa2_challenger_improvement_factor: 1.20  # candidate > 1.20× held score
    cfpa2_challenger_min_lock_age_sec: 2.0     # earliest tick after assignment
    switch_hysteresis: 0.50
    # 2026-05-05: 0.60 → 0.45m. Must be ≥ Nav2's xy_goal_tolerance (0.40m
    # in nav2_go2w_real.yaml) so CFPA2's "held goal reached?" check fires
    # the moment Nav2 declares SUCCEEDED. Previously a dead band 0.40–0.60m:
    # Nav2 stopped issuing cmd_vel, CFPA2 kept the same goal, bridge
    # filtered duplicates, robot stuck idle. The +0.05m margin avoids
    # racing tick-by-tick around the boundary.
    switch_min_dist: 0.45
    min_assign_distance: 0.30
    # Same alignment for reached-blacklist (default 0.30m left a similar
    # dead band). Now any goal that lands within Nav2's tolerance window
    # gets blacklisted after 3 ticks, forcing CFPA2 to pick a new frontier.
    reached_blacklist_dist: 0.45
    overlap_weight: 1.0
    cfpa2_w_ig: 1.0
    cfpa2_w_c: 0.3
    cfpa2_w_sw: 0.2
    cfpa2_lambda_overlap: 0.0
    cfpa2_sigma_overlap_m: 0.0
    cfpa2_stuck_lock_sec: 8.0
    cfpa2_stuck_min_motion_m: 0.10
    cfpa2_stuck_blacklist_sec: 15.0
    cfpa2_close_stop_radius_m: 0.0
    cfpa2_close_stop_speed_epsilon: 0.02
    cfpa2_space_time_enabled: false
    cfpa2_space_time_horizon_sec: 5.0
    cfpa2_space_time_dt_sec: 0.40
    cfpa2_space_time_safety_radius_m: 0.45
    cfpa2_space_time_waypoint_lookahead_m: 0.9
    cfpa2_space_time_window_margin_m: 3.0
    cfpa2_space_time_max_expansions: 12000
    cfpa2_space_time_assumed_speed_mps: 0.25
    cfpa2_space_time_max_speed_mps: 0.60
    cfpa2_frontier_min_cluster_area_m2: 0.08
    # Frontier must sit at least this far from the nearest occupied cell.
    # Go2W body half-width is ~0.25 m; below that, a picked frontier can
    # wedge the robot against a wall. 0.35 = half-width + small margin.
    cfpa2_frontier_obstacle_clearance_m: 0.35
    communication_timeout_sec: 0.0
    prediction_horizon_sec: 0.0
    pursuit_weight: 0.0
    pursuit_switch_margin: 0.10
    # IG box = (2r+1)² cells. At octomap res 0.05 m, r=40 → 4.0 × 4.0 m
    # sampling box. Old r=12 (1.2 m) saturated for both tiny pockets and
    # huge unexplored rooms, making cost dominate → CFPA2 picked the
    # nearest small frontier instead of the 20 m² unknown region behind
    # the robot. r=40 resolves big regions while staying O(n²) cheap
    # (C++ batch_info_gain caps this fine).
    exploration_gain_radius_cells: 40
    meeting_min_distance: 0.0
    teammate_stale_ttl_sec: 0.0
    perf_enable: true
    perf_tick_window_size: 240
    perf_min_samples: 20
    perf_tick_warn_p95_ms: 100.0
    perf_cpu_warn_pct: 15.0
    adaptive_load_shedding_enabled: true
    adaptive_budget_utilization: 0.70
    adaptive_restore_utilization: 0.45
    adaptive_max_frontier_stride: 8
    adaptive_min_max_targets: 80
    # Adaptive IG shed floor: CFPA2 downshifts when CPU/p95 over budget.
    # Raised from 6 → 20 so that even under load IG stays at a 2 m box,
    # avoiding regression to "small-nearby beats huge-far".
    adaptive_min_exploration_gain_radius_cells: 20
    adaptive_max_skip_ticks: 3
