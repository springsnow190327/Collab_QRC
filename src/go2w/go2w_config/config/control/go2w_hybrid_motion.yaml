/**:
  ros__parameters:
    publish_rate: 20.0
    cmd_timeout_sec: 0.50

    idle_linear_threshold: 0.02
    idle_lateral_threshold: 0.02
    idle_angular_threshold: 0.05

    wheel_linear_threshold: 0.18
    wheel_lateral_threshold: 0.05
    wheel_angular_threshold: 0.30
    wheel_curvature_threshold: 0.45

    # Reduced 1.2 → 0.5 so the router switches out of wheel mode faster
    # when astar commands a sharp turn. Previously a cruising robot that
    # got a new goal behind it spent 1.2 s in wheel mode executing a wide
    # skid-steer U-turn before finally switching to legged pivot — often
    # crashing into a wall first.
    wheel_mode_hold_sec: 0.5
    legged_mode_hold_sec: 0.8

    # Emergency-bypass curvature: if astar requests legged with κ=|ω|/|v|
    # ≥ this, skip the wheel hold and switch immediately. 1.0 /m = 1 m
    # radius, well above any normal wheel cruise curve but well below a
    # pivot-in-place command (κ >> 5 /m). Covers the U-turn case without
    # flapping during gentle arcs.
    legged_override_curvature: 1.0

    wheel_radius_m: 0.09
    wheel_track_m: 0.40
    wheel_max_angular_speed: 8.5
    wheel_joint_signs: [1.0, 1.0, 1.0, 1.0]

    # Ramp override for Go2W. A slope-verified ramp goal should stay in powered
    # wheel mode; switching into CHAMP legged pivots on the ramp/foot can tip
    # the wheeled body. The router clamps vx/wz while this override is active.
    ramp_force_legged_enabled: false
    ramp_force_wheel_enabled: true
    ramp_goal_topic: ramp_ascent_goal
    ramp_goal_stale_sec: 9999.0
    ramp_force_min_goal_x: 5.3
    ramp_force_max_goal_x: 11.2
    ramp_force_max_abs_goal_y: 0.9
    ramp_force_max_vx_mps: 0.30
    ramp_force_max_yaw_rate_rps: 0.20
