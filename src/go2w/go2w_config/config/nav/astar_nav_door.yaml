/**:
  ros__parameters:
    # A* nav for the DOOR PUSH task — port of reactive_nav_door.yaml
    # to the astar_nav_node. Aggressive obstacle thresholds so the
    # robot drives close to the door panel (bumper contact requires
    # body centre within ~0.36 m of door face).
    #
    # Differences vs astar_nav_go2w.yaml (generic exploration):
    #   - lower max speeds (tight rooms)
    #   - zero startup_delay (door task drives immediately after bringup)
    #   - very small obstacle slow/stop distances (close contact with door)
    #   - thin inflation (paths must fit through door opening)
    #   - tighter goal tolerance (need to stop accurately on door push pose)

    # ── speed / accel envelope ────────────────────────────────────
    max_linear_speed:    0.35   # m/s
    max_angular_speed:   0.70   # rad/s
    min_linear_speed:    0.05
    linear_accel_max:    0.50
    angular_accel_max:   2.00
    control_rate:        20.0   # Hz
    startup_delay:       0.0    # door task issues cmd immediately
    startup_ramp_sec:    0.5    # quick ramp

    # ── goal behaviour ────────────────────────────────────────────
    goal_tolerance:                       0.15
    goal_slow_radius:                     0.60
    goal_slow_floor:                      0.08
    goal_reached_replan_cooldown_sec:     0.5

    # ── curvature shaping (light — door corridors are short) ──────
    curvature_lookahead_segments:  4
    curv_full_speed_below:         0.30
    curv_slow_above:               1.20
    curv_factor_min:               0.40

    # ── pure pursuit ─────────────────────────────────────────────
    lookahead_min:    0.20
    lookahead_max:    0.50
    lookahead_gain:   0.50
    cross_track_gain: 0.70

    # ── reactive safety (scan) ── KEY DIFFERENCE VS GENERIC ──────
    # Stop right against the door so the bumper can contact.
    obstacle_slow_dist:      0.20
    obstacle_stop_dist:      0.05
    front_half_angle_deg:    30.0
    side_check_angle_deg:    50.0
    turn_in_place_on_block:  false

    # ── A* grid / map ─────────────────────────────────────────────
    map_topic:                ""      # empty → auto /{namespace}/map
    map_frame:                "world"
    map_occupied_thresh:      50
    global_downsample:        3
    global_inflation_m:       0.05    # thin — paths must fit door gap
    global_waypoint_spacing_m: 0.40
    global_replan_sec:        2.0
    resample_step_m:          0.10

    # ── wheel ↔ legged mode dispatch ──────────────────────────────
    wheel_linear_threshold_for_bias:  0.18
    wheel_angular_threshold_for_bias: 0.30
    prefer_legs_when_curv_above:      0.90
    legs_bias_linear_max:             0.15
    legs_bias_angular_min:            0.35
    leg_heading_threshold_deg:        10.0
    legs_mode_v_cap:                  0.15
    legs_mode_w_cap:                  0.45
    legs_pivot_above_deg:             30.0   # pivot in place above this |ψ_err|

    # ── trajectory display ────────────────────────────────────────
    trajectory_min_step_m:   0.02
    trajectory_max_points:   20000

    # ── Option B: oriented footprint validation ───────────────────
    # Door task: bigger footprint buffer OFF because we actually
    # want to drive close enough to touch the panel. Keep the
    # retries tiny so if a clip is hit the planner can reroute.
    footprint_length:                 0.65
    footprint_width:                  0.45
    footprint_check_stride_m:         0.08
    footprint_retry_disk_radius_m:    0.20
    footprint_max_retries:            3
    footprint_nogo_ttl_sec:          10.0
    footprint_skip_near_robot_m:      0.45   # skip current-pose area so the
                                             # pre-push stance doesn't self-fault
    footprint_buffer_m:               0.00   # no halo — door-contact clearance

    # ── topics ────────────────────────────────────────────────────
    frontier_replan_topic: "/frontier_replan"
    stop_topic:            "/stop"
