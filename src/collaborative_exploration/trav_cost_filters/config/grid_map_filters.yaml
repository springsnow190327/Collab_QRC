# grid_map_filters chain for trav_cost_filters::filter_chain_runner.
#
# Phase 4 of plans/2026-05-14-trav-grid-rewrite.md. Implements the ETH RSL
# pipeline documented in docs/claude/eth_elevation_mapping_design.md "Stage B":
#
#   elevation  →  surface_normals (PCA)
#              →  slope = acos(normal_z)
#              →  roughness (RMS plane residual via window std)
#              →  step_height = max - min in 3x3
#              →  step_residual = step_height - tan(slope) * 0.30m
#              →  traversability ∈ [0, 1]  (soft slope/roughness, residual-step veto)
#
# Wall vs ramp discrimination is carried by `step_cost`, not slope (see the
# design doc). A vertical wall has slope=π/2 AND residual step≫crit → veto.
# A 14° demo_ramp has a non-zero 3x3 max-min, but that height change is
# explained by tan(slope) over the local support window, so residual step≈0.
#
# Node-name keying: must match the node name passed at launch.
# `filter_chain_runner` (the default) lets us use this yaml unchanged.

/**:
  ros__parameters:

    input_topic: "elevation_map_raw"
    output_topic: "elevation_map_filtered"
    filter_chain_param: "filters"

    filters:

      # 1. surface_normals via PCA over a circular window.
      #    radius 0.25 m ≈ 5x5 cells at 0.10 m resolution. ETH default.
      filter1:
        name: surface_normals
        type: gridMapFilters/NormalVectorsFilter
        params:
          algorithm: area
          input_layer: elevation
          output_layers_prefix: normal_vectors_
          radius: 0.25
          normal_vector_positive_axis: z

      # 2. slope angle = acos(normal_z), in radians (0=flat, pi/2=vertical).
      filter2:
        name: slope
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: slope
          expression: acos(normal_vectors_z)

      # 3. slope_cost: linear ramp 0 -> 1 as slope goes 0 -> 30 deg (0.5236 rad).
      #    > 30 deg is a non-traversable slope.
      filter3:
        name: slope_cost
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: slope_cost
          expression: slope / 0.5236

      # 4. roughness: std-dev of elevation in a 5-cell window (≈0.50 m diameter).
      #    SlidingWindowMathExpressionFilter handles NaN holes via meanOfFinites.
      filter4:
        name: roughness
        type: gridMapFilters/SlidingWindowMathExpressionFilter
        params:
          input_layer: elevation
          output_layer: roughness
          expression: sqrt(meanOfFinites(square(elevation - meanOfFinites(elevation))))
          compute_empty_cells: false
          edge_handling: crop
          window_size: 5

      # 5. roughness_cost: linear 0 -> 1 over 0 -> 0.05 m RMS. Critical val
      #    chosen so a clean ramp (~0 m RMS) is 0 and rocky terrain saturates.
      filter5:
        name: roughness_cost
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: roughness_cost
          expression: roughness / 0.05

      # 6. step_height: max - min of elevation in a 3-cell window (~0.30 m).
      #    Catches walls / cliffs that the slope filter would over-rate.
      filter6:
        name: step_height
        type: gridMapFilters/SlidingWindowMathExpressionFilter
        params:
          input_layer: elevation
          output_layer: step_height
          expression: maxOfFinites(elevation) - minOfFinites(elevation)
          compute_empty_cells: false
          edge_handling: crop
          window_size: 3

      # 7. step_residual: subtract the continuous rise predicted by the local
      #    plane before applying the step veto. This is the equation that keeps
      #    a smooth ramp traversable while still rejecting a wall/cliff:
      #      residual = max(0, local_max_min - tan(slope) * support_width)
      #    support_width=0.30m matches the 3-cell step window at 0.10m/cell.
      filter7:
        name: step_residual
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: step_residual
          expression: step_height - tan(slope) * 0.30

      filter8:
        name: step_residual_clamp_lo
        type: gridMapFilters/ThresholdFilter
        params:
          layer: step_residual
          lower_threshold: 0.0
          set_to: 0.0

      # 8. step_cost: slope-compensated residual cost. Linear 0 -> 1 over
      #    0 -> 0.20 m residual height diff. On a smooth 14° ramp:
      #      step_height ≈ tan(14°)·0.20 ≈ 0.05 m
      #      step_residual ≈ 0.05 - tan(14°)·0.30 ≈ -0.02 m  -> clamped to 0
      #    -> step_cost = 0. Ramp stays traversable.
      filter9:
        name: step_cost
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: step_cost
          expression: step_residual / 0.20

      # 10. wall_seed: raw step_height in excess of 0.25 m. This is the
      #     "unambiguous vertical structure" detector. On any slope at our
      #     0.10 m resolution + σ=0.02 m noise, step_height is bounded by
      #     ~0.10 m, so wall_seed ≤ 0 -> clamped to 0. Only true walls /
      #     cliffs (step_height ≈ wall_full_height ≈ 1 m at the rim) survive.
      #     Decoupling this from step_residual prevents ramp noise from
      #     producing false-positive lethal cells after dilation below.
      #
      #     NOTE: filters::FilterChain (filter_chain.hpp:117) ONLY loads keys
      #     literally named "filter1", "filter2", ... and breaks at the first
      #     gap. Keys like "filter9b" are silently dropped. We must renumber
      #     to keep filterN contiguous.
      filter10:
        name: wall_seed_raw
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: wall_seed
          expression: step_height - 0.25

      filter11:
        name: wall_seed_clamp_lo
        type: gridMapFilters/ThresholdFilter
        params:
          layer: wall_seed
          lower_threshold: 0.0
          set_to: 0.0

      # 11. wall_cost dilation. The wall_seed is non-zero only on the 1-cell
      #     rim where the step_height window straddles wall-and-ground. Take
      #     max(wall_seed) in a 7-cell window (~±0.30 m radius) so the lethal
      #     rim grows inward and covers wall tops up to ~60 cm thick. Because
      #     wall_seed is already gated to "step_height > 25 cm", dilating it
      #     does NOT poison ramps (their wall_seed is identically 0).
      filter12:
        name: wall_cost_dilated
        type: gridMapFilters/SlidingWindowMathExpressionFilter
        params:
          input_layer: wall_seed
          output_layer: wall_seed_dilated
          expression: maxOfFinites(wall_seed)
          compute_empty_cells: false
          edge_handling: crop
          window_size: 7

      # 12. wall_cost normalization: 0.50 m above-threshold wall height
      #     saturates the cost to 1.0 (hard veto). Smaller values map linearly.
      #     Output to a new layer (not the dilation source) to avoid the
      #     MathExpressionFilter setShared() aliasing pitfall.
      filter13:
        name: wall_cost_norm
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: wall_cost
          expression: wall_seed_dilated / 0.50

      # 13. trav_eth: multiplicative model — product of (1 - cost_i) over
      #    slope, roughness, residual-step (cliff veto), and wall (vertical
      #    structure veto). Any cost=1 → trav_eth=0. ThresholdFilters below
      #    clamp to [0,1] for costs that exceed 1.0.
      #    NOTE: named trav_eth (not traversability) to avoid aliasing with the
      #    pre-existing all-NaN "traversability" layer from elevation_mapping_cupy.
      #    MathExpressionFilter::update() setShared()s all existing layers;
      #    writing back to the same name aliases the shared pointer → all NaN.
      #    CRITICAL: use .* (MATLAB element-wise product) not * (matrix multiply).
      #    EigenLab follows MATLAB semantics: A*B = matrix mul → all-NaN for
      #    sparse grids; A.*B = element-wise → correct per-cell traversability.
      filter14:
        name: trav_eth
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: trav_eth
          expression: (1.0 - slope_cost) .* (1.0 - roughness_cost) .* (1.0 - step_cost) .* (1.0 - wall_cost)

      # 14. Final clamp safety net.
      filter15:
        name: trav_eth_clamp_lo
        type: gridMapFilters/ThresholdFilter
        params:
          layer: trav_eth
          lower_threshold: 0.0
          set_to: 0.0

      filter16:
        name: trav_eth_clamp_hi
        type: gridMapFilters/ThresholdFilter
        params:
          layer: trav_eth
          upper_threshold: 1.0
          set_to: 1.0

      # ---- CNN ↔ analytical fusion ----------------------------------------
      # The ETH CNN (layer `traversability`, populated by elevation_mapping_cupy
      # get_filter_cupy on Blackwell) is excellent at walls but trained on
      # mostly flat ground, so it mis-flags sustained-slope ramps as lethal.
      # The analytical chain detects ramps cleanly via (slope < 30°,
      # step_residual < 6cm). Fuse: take max(CNN, ramp_safe).
      #
      # ramp_safe is a continuous [0, 1] eligibility derived from slope and
      # step_residual via clamped subtraction (EigenLab has no `>` operator).
      # It uses a trapezoidal slope envelope, not a high-gain "any slope below
      # 30 deg is safe" shortcut:
      #   - zero below 8 deg so ramp-foot transition cells fall back to CNN
      #   - one from 12..24 deg for clear ramp body cells
      #   - zero again by 30 deg
      # This keeps smooth ramps traversable without marking shallow transition
      # zones or platform tops as confidently free.

      # slope_floor_margin = clamp((slope - 8deg) / (12deg - 8deg), 0, 1).
      filter17:
        name: slope_floor_margin
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: slope_floor_margin
          expression: (slope - 0.13962634015954636) / 0.06981317007977318

      filter18:
        name: slope_floor_margin_clamp_lo
        type: gridMapFilters/ThresholdFilter
        params:
          layer: slope_floor_margin
          lower_threshold: 0.0
          set_to: 0.0

      filter19:
        name: slope_floor_margin_clamp_hi
        type: gridMapFilters/ThresholdFilter
        params:
          layer: slope_floor_margin
          upper_threshold: 1.0
          set_to: 1.0

      # slope_ceiling_margin = clamp((30deg - slope) / (30deg - 24deg), 0, 1).
      filter20:
        name: slope_ceiling_margin
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: slope_ceiling_margin
          expression: (0.5235987755982988 - slope) / 0.10471975511965977

      filter21:
        name: slope_ceiling_margin_clamp_lo
        type: gridMapFilters/ThresholdFilter
        params:
          layer: slope_ceiling_margin
          lower_threshold: 0.0
          set_to: 0.0

      filter22:
        name: slope_ceiling_margin_clamp_hi
        type: gridMapFilters/ThresholdFilter
        params:
          layer: slope_ceiling_margin
          upper_threshold: 1.0
          set_to: 1.0

      # step_margin = max(0, 0.06 - step_residual) / 0.06 --- normalised.
      filter23:
        name: step_margin
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: step_margin
          expression: (0.06 - step_residual) / 0.06

      filter24:
        name: step_margin_clamp_lo
        type: gridMapFilters/ThresholdFilter
        params:
          layer: step_margin
          lower_threshold: 0.0
          set_to: 0.0

      filter25:
        name: step_margin_clamp_hi
        type: gridMapFilters/ThresholdFilter
        params:
          layer: step_margin
          upper_threshold: 1.0
          set_to: 1.0

      # ramp_safe = trapezoidal_slope_membership * step_margin.
      filter26:
        name: ramp_safe_raw
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: ramp_safe
          expression: slope_floor_margin .* slope_ceiling_margin .* step_margin

      filter27:
        name: ramp_safe_clamp_hi
        type: gridMapFilters/ThresholdFilter
        params:
          layer: ramp_safe
          upper_threshold: 1.0
          set_to: 1.0

      # trav_fused = max(CNN, ramp_safe).
      # EigenLab has no element-wise max — use max(a,b) = 0.5*(a + b + |a-b|).
      filter28:
        name: trav_fused
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: trav_fused
          expression: 0.5 .* (traversability + ramp_safe + abs(traversability - ramp_safe))

      filter29:
        name: trav_fused_clamp_lo
        type: gridMapFilters/ThresholdFilter
        params:
          layer: trav_fused
          lower_threshold: 0.0
          set_to: 0.0

      filter30:
        name: trav_fused_clamp_hi
        type: gridMapFilters/ThresholdFilter
        params:
          layer: trav_fused
          upper_threshold: 1.0
          set_to: 1.0
