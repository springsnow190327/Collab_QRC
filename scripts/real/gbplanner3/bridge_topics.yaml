# ros1_bridge parameter_bridge config (Orin).
#
# UPDATED 2026-05-12 for Point-LIO native ROS 1 stack:
#   - SLAM topics (cloud_registered_body, Odometry, /tf, /tf_static) are now
#     published natively in ROS 1 by Point-LIO (see onboard_pointlio_noetic.sh).
#     The previous "2to1" bridges for these are gone — gbplanner subscribes
#     directly to the ROS 1 publishers, eliminating the 5-10 MB/s pointcloud
#     bandwidth bottleneck that motivated the Noetic FAST-LIO migration.
#
#   - The ONLY remaining traffic across this bridge is the gbplanner3 PCI
#     output (PoseArray < 1 KB/s) heading laptop-side, plus the mission-
#     control services going the other way.
#
# Architecture:
#   ROS 1 Noetic (Jetson, native)
#     Point-LIO + voxblox + gbplanner_node + pci_general
#                       │
#                       │ /pci_command_path (MultiDOFJointTrajectory)
#                       ▼
#                  (this bridge)
#                       │
#                       ▼
#   ROS 2 Foxy ←DDS via WiFi→ Laptop ROS 2 Humble
#     SanD-Planner / path-follower consumes /pci_command_path
#
# This file is loaded by `ros2 run ros1_bridge parameter_bridge __params:=...`.

topics:
  # =====  ROS 1 Noetic  --->  ROS 2 Foxy  =====
  # PCI publishes trajectory_msgs/MultiDOFJointTrajectory (NOT PoseArray —
  # confirmed from pci_general source + rostopic type /pci_command_path).
  - topic: /pci_command_path
    type: trajectory_msgs/msg/MultiDOFJointTrajectory
    queue_size: 5
    direction: 1to2

  - topic: /gbplanner/exploration_status
    type: std_msgs/msg/String
    queue_size: 5
    direction: 1to2

services:
  # Allow laptop ROS 2 Humble to call Noetic services for mission control.
  - service: /planner_control_interface/std_srvs/automatic_planning
    type: std_srvs/srv/Empty
    direction: 2to1

  - service: /planner_control_interface/stop_request
    type: std_srvs/srv/Empty
    direction: 2to1
