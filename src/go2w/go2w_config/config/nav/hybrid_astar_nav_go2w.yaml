# Hybrid A* + Ceres-smoothed nav for Go2W (single-robot scenes).
#
# This is a v0.1 tuning aimed at MuJoCo demo1/demo3 with the same
# I/O contract as astar_nav_node (drop-in via nav_backend:=hybrid_astar).
#
# Why these defaults:
#   - rs_turning_radius = 0.8 m: Go2W's wheel-mode minimum turning radius.
#     Aligned with step_length / sin(max_steer) = 0.4 / sin(0.40) ≈ 1.03 m
#     when both are at saturation; a slightly tighter radius (0.8) lets
#     RS analytic shots find tighter terminal manoeuvres without making
#     forward-only primitives over-curve.
#   - n_theta = 24 (15° bins): coarse enough to keep closed set small,
#     fine enough that consecutive expansions advance the heading bin.
#   - allow_reverse = false: forward-biased; legged mode handles turns,
#     reverse rarely improves paths in indoor exploration. Flip if you
#     find the planner failing in tight back-out scenarios.
#   - smoother weights: anchor < smooth < obstacle < curvature in raw
#     magnitude, but obstacle hinge dominates near walls (safety_m=0.35
#     ≈ inflation_m + half body width). Curvature term keeps turns C¹.

hybrid_astar_nav:
  ros__parameters:
    use_sim_time: true

    # ── speed envelope ────────────────────────────────────────────────
    max_linear_speed:  0.70
    max_angular_speed: 1.00
    min_linear_speed:  0.05
    linear_accel_max:  0.50
    linear_decel_max:  0.50
    angular_accel_max: 1.20
    control_rate:      20.0
    startup_delay:     1.0
    startup_ramp_sec:  2.0

    # ── goal behaviour ────────────────────────────────────────────────
    goal_tolerance:                       0.25
    goal_slow_radius:                     1.5
    goal_slow_floor:                      0.15
    goal_reached_replan_cooldown_sec:     1.0
    goal_reached_brake_sec:               0.6

    # ── pure-pursuit + Stanley tracker ────────────────────────────────
    lookahead_min:    0.30
    lookahead_max:    0.80
    lookahead_gain:   0.60
    cross_track_gain: 0.70

    # ── curvature speed shaping ───────────────────────────────────────
    curvature_lookahead_segments: 6
    curv_full_speed_below:        0.30   # 1/m
    curv_slow_above:              1.50   # 1/m
    curv_factor_min:              0.10

    # ── reactive scan brake ───────────────────────────────────────────
    obstacle_slow_dist:   0.75
    obstacle_stop_dist:   0.35
    front_half_angle_deg: 35.0

    # ── map / coarse grid ─────────────────────────────────────────────
    map_topic: ""               # empty → "/{namespace}/map"
    map_frame: "map"
    base_frame: "base_link"
    map_occupied_thresh: 50
    global_downsample:   3
    global_inflation_m:  0.18
    global_replan_sec:   1.5
    resample_step_m:     0.10

    # ── Hybrid A* search ──────────────────────────────────────────────
    ha_n_theta:           24
    ha_step_length:        0.40
    ha_max_steer:          0.40    # rad
    ha_allow_reverse:     false
    ha_reverse_penalty:    2.0
    ha_switch_penalty:     1.5     # cost added on direction change
    ha_steer_change_pen:   0.3     # cost added when steering changes
    ha_max_iters:         20000
    ha_rs_shot_period:     5
    ha_rs_turning_radius:  0.8     # metres
    ha_goal_tol_xy:        0.25
    ha_goal_tol_theta:     0.30    # rad

    # ── footprint validation (oriented rectangle) ─────────────────────
    footprint_length:           0.65
    footprint_width:            0.45
    footprint_check_stride_m:   0.08
    footprint_buffer_m:         0.03

    # ── Ceres smoother weights ────────────────────────────────────────
    smoother_anchor_w:    0.5
    smoother_smooth_w:    5.0
    smoother_obstacle_w:  8.0
    smoother_curvature_w: 2.0
    smoother_safety_m:    0.35
    smoother_max_iters:   40

    # ── hybrid_cmd_router mode bias (wheel ↔ leg) ─────────────────────
    wheel_linear_threshold_for_bias:  0.18
    wheel_angular_threshold_for_bias: 0.30
    leg_heading_threshold_deg:        12.0
    legs_mode_v_cap:                  0.15
    legs_mode_w_cap:                  0.45

    # ── glue topics ───────────────────────────────────────────────────
    frontier_replan_topic: "/frontier_replan"
    stop_topic:            "/stop"
