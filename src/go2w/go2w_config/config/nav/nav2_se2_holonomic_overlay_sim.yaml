# SE2 forward-pivot overlay for SIMULATION Nav2 stacks.
#
# Sibling of nav2_go2w_real_se2_holonomic_overlay.yaml, layered on top of
# the per-robot sim base yamls (nav2_go2w_full_stack.yaml /
# nav2_go2_full_stack.yaml). Mirrors the real SE2 profile: SmacPlannerLattice
# with DIFF primitives + DiffDrive MPPI execution + yaw-align/forward bias.
#
# Why a separate sim overlay (not reuse the real one):
#   - Real overlay anchors vx_max=0.50, ax_max=0.50, wz_max=1.0 — matching
#     Go2W wheels. Sim has two robots at different caps (Go2W 0.50,
#     Go2 walking 0.30). Omitting vx/wz/ax here keeps per-robot base
#     velocities intact when the overlay merges.
#   - Real overlay uses the tighter real-laptop budget (max_iterations 80k,
#     max_planning_time 1.5 s). Sim has more compute headroom, so we
#     relax to 1M / 5.0 s — matches sim base SmacHybrid budget.
#
# Lattice primitives: 5 cm res / 0.5 m turning radius / diff
#   - Matches Go2W sim's min_turning_radius=0.30 reasonably (0.5 m is
#     the closest stock primitive set).
#   - For Go2 sim (min_turning_radius=0.05), 0.5 m primitives produce
#     wider arcs than strictly required but stay kinematically feasible.
#     Stock nav2_smac_planner only ships 0.5 m and 1 m diff primitives.

planner_server:
  ros__parameters:
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      tolerance: 0.4
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      lattice_filepath: "/opt/ros/humble/share/nav2_smac_planner/sample_primitives/5cm_resolution/0.5m_turning_radius/diff/output.json"
      allow_reverse_expansion: true
      reverse_penalty: 8.0
      change_penalty: 1.0
      non_straight_penalty: 1.30
      rotation_penalty: 1.50
      cost_penalty: 3.0
      retrospective_penalty: 0.015
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

controller_server:
  ros__parameters:
    FollowPath:
      vy_std: 0.0
      vy_max: 0.0
      ay_max: 0.0
      motion_model: "DiffDrive"
      GoalAngleCritic:
        cost_weight: 2.5
      PathAngleCritic:
        cost_weight: 2.0
      PreferForwardCritic:
        cost_weight: 5.0
