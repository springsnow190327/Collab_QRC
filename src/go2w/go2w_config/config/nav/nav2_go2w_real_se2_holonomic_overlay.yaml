# SE2 forward-pivot overlay for REAL Go2W Nav2.
#
# Layered on top of `nav2_go2w_real.yaml` to preserve the original
# diff-drive profile and the existing omni_2d profile for A/B testing.
# This profile switches global planning to SmacPlannerLattice while
# preserving anisotropic-footprint SE2 reasoning, but intentionally
# removes lateral crab-walk in execution.
#
# Goal: align yaw, move primarily forward, and pivot-in-place when needed,
# while still benefiting from SE2 planning in tight passages where XY-only
# planners are too conservative.

planner_server:
  ros__parameters:
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      tolerance: 0.4
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 80000
      max_on_approach_iterations: 1000
      max_planning_time: 1.5
      # Use DIFF primitives (not omni) so the global path does not rely on
      # lateral translation. Keep 5 cm resolution and 0.5 m turn geometry
      # consistent with real Go2W costmaps.
      lattice_filepath: "/opt/ros/humble/share/nav2_smac_planner/sample_primitives/5cm_resolution/0.5m_turning_radius/diff/output.json"
      allow_reverse_expansion: true
      # Forward-biased costs, with reverse kept as an escape hatch.
      reverse_penalty: 8.0
      change_penalty: 1.0
      non_straight_penalty: 1.30
      rotation_penalty: 1.50
      cost_penalty: 4.0
      retrospective_penalty: 0.015
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 1.0
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true
      smoother:
        max_iterations: 2000
        w_smooth: 0.5
        w_data: 0.2
        tolerance: 1.0e-10

controller_server:
  ros__parameters:
    FollowPath:
      vx_max: 0.50
      vx_min: -0.20
      vy_std: 0.0
      vy_max: 0.0
      ax_max: 0.50
      ax_min: -0.50
      ay_max: 0.0
      wz_max: 1.0
      motion_model: "DiffDrive"
      # Yaw alignment matters for this profile: prefer pivot + forward.
      GoalAngleCritic:
        cost_weight: 2.5
      PathAngleCritic:
        cost_weight: 2.0
      # Keep a strong forward preference to suppress reverse hunting.
      PreferForwardCritic:
        cost_weight: 5.0
