/**:
  ros__parameters:
    # VLM FAR exploration variant.
    # Based on default_nav_single_go2w.yaml with tuning for:
    #   - No settle gate (SLAM startup gate handles it)
    #   - Wider obstacle margins (FAR plans longer paths through corridors)
    #   - Lower min speed ratio (fine-grained slow approach)
    #   - Larger planner search radius (FAR goals may be farther)
    #   - Higher tight-turn front clearance (more conservative give-way)

    max_linear_speed: 0.50
    max_angular_speed: 0.90
    control_rate: 12.0
    startup_delay: 0.0
    goal_tolerance: 0.18
    goal_reached_replan_cooldown_sec: 1.0

    require_settle_before_motion: false
    settle_speed_threshold: 0.10
    settle_hold_sec: 0.8

    obstacle_slow_dist: 1.40
    obstacle_stop_dist: 0.70
    front_half_angle_deg: 35.0
    side_check_angle_deg: 60.0
    avoidance_gain: 1.1
    avoidance_deadband: 0.08
    avoidance_max_ratio: 0.25
    avoidance_conflict_scale: 0.10
    turn_in_place_on_block: true

    teammate_avoid_enabled: false
    wall_scan_enabled: false

    planner_enabled: true
    planner_replan_sec: 1.5
    planner_invalid_replan_count: 3
    planner_grid_radius: 4.5
    planner_resolution: 0.10
    planner_inflation_radius: 0.45
    planner_goal_clip_distance: 4.0
    planner_goal_search_radius: 2.4
    planner_start_clearance_radius: 0.12
    planner_waypoint_spacing: 0.30
    planner_waypoint_lookahead: 0.85
    planner_safety_clearance: 0.55
    planner_unknown_is_obstacle: false

    path_smoothing_passes: 0
    min_speed_ratio: 0.05

    planner_escape_enabled: true
    planner_escape_min_range: 1.00
    planner_escape_min_step: 0.35
    planner_escape_max_step: 1.20
    planner_escape_goal_align_gain: 0.75
    planner_escape_turn_penalty_gain: 0.35
    planner_escape_clearance_gain: 1.10
    planner_escape_blocked_front_penalty: 2.00
    escape_waypoint_hold_sec: 4.0
    escape_waypoint_reach_tol: 0.30

    blocked_replan_sec: 0.4
    blocked_replan_cooldown_sec: 1.0
    blocked_progress_epsilon: 0.06

    stall_recovery_enabled: true
    stall_cmd_min_linear: 0.06
    stall_speed_epsilon: 0.03
    stall_heading_threshold_deg: 35.0
    stall_progress_min_delta_m: 0.06
    stall_trigger_sec: 1.5
    stall_recovery_cooldown_sec: 3.0

    unstick_reverse_enabled: true
    unstick_reverse_speed: 0.10
    unstick_reverse_sec: 0.8
    unstick_turn_speed: 0.55
    unstick_min_rear_clearance: 0.55

    tight_turn_preempt_enabled: true
    tight_turn_angle_threshold_deg: 70.0
    tight_turn_min_front_clearance: 0.85
