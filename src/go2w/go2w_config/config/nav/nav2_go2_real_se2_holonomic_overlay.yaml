# SE2 forward-pivot overlay for REAL Go2 (no-wheel walking quadruped) Nav2.
#
# Layered on top of `nav2_go2_real.yaml`. Mirrors the Go2W SE2 overlay
# (`nav2_go2w_real_se2_holonomic_overlay.yaml`) but intentionally OMITS the
# platform-specific speed envelope (vx_max / vx_min / ax_max / ax_min /
# wz_max). Those are already CHAMP-walking-tuned in nav2_go2_real.yaml
# (vx_max=0.30, wz_max=0.8, ax_max=0.30) and should NOT be overwritten by
# the Go2W wheeled values (0.50, 1.0, 0.50).
#
# Profile semantics — same as Go2W:
#   - Global plan via SmacPlannerLattice with 0.5m-radius diff primitives.
#     The 0.5m turning radius is wider than Go2 walking strictly requires
#     (CHAMP can pivot in place), but it's the only diff lattice that ships
#     with nav2_smac_planner. Stays kinematically feasible.
#   - Local execution: MPPI DiffDrive (no strafe), forward-bias critics,
#     pivot-then-forward execution. Suppresses lateral crab-walk.

planner_server:
  ros__parameters:
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      tolerance: 0.4
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 80000
      max_on_approach_iterations: 1000
      max_planning_time: 1.5
      lattice_filepath: "/opt/ros/humble/share/nav2_smac_planner/sample_primitives/5cm_resolution/0.5m_turning_radius/diff/output.json"
      allow_reverse_expansion: true
      reverse_penalty: 8.0
      change_penalty: 1.0
      non_straight_penalty: 1.30
      rotation_penalty: 1.50
      cost_penalty: 4.0
      retrospective_penalty: 0.015
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 1.0
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true
      smoother:
        max_iterations: 2000
        w_smooth: 0.5
        w_data: 0.2
        tolerance: 1.0e-10

controller_server:
  ros__parameters:
    FollowPath:
      # Strafe disabled (DiffDrive motion model). Speed envelope inherited
      # from nav2_go2_real.yaml — do NOT add vx_max / wz_max / ax_max here.
      vy_std: 0.0
      vy_max: 0.0
      ay_max: 0.0
      motion_model: "DiffDrive"
      # Yaw alignment + forward bias.
      GoalAngleCritic:
        cost_weight: 2.5
      PathAngleCritic:
        cost_weight: 2.0
      PreferForwardCritic:
        cost_weight: 5.0
