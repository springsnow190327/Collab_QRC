/**:
  ros__parameters:
    # MPPI-based local navigation for VLM exploration.
    # Drop-in replacement for reactive_nav_vlm.yaml.
    # All trajectories are kinematically feasible (unicycle model).

    max_linear_speed: 0.70
    max_angular_speed: 0.85
    control_rate: 12.0
    startup_delay: 0.0
    goal_tolerance: 0.20
    goal_reached_replan_cooldown_sec: 1.0

    # Reactive safety layer (scan-based, same as reactive_nav)
    obstacle_slow_dist: 0.75
    obstacle_stop_dist: 0.35
    front_half_angle_deg: 35.0
    side_check_angle_deg: 60.0
    turn_in_place_on_block: true

    # Local grid (used by MPPI for obstacle lookup)
    grid_radius: 4.0
    grid_resolution: 0.10
    inflation_radius: 0.15
    start_clearance_radius: 0.12
    unknown_is_obstacle: true

    # MPPI planner
    mppi_num_rollouts: 512
    mppi_horizon: 30
    mppi_dt: 0.1              # 3.0 s lookahead
    mppi_temperature: 0.05    # lower = greedier selection
    mppi_linear_noise: 0.20   # std dev on linear velocity samples
    mppi_angular_noise: 0.40  # std dev on angular velocity samples

    # MPPI cost weights
    mppi_w_goal: 5.0          # terminal distance to goal
    mppi_w_heading: 2.0       # alignment toward goal each step
    mppi_w_obstacle: 25.0     # proximity penalty (distance field)
    mppi_w_speed: -0.5        # negative = reward forward motion
    mppi_w_angular: 0.8       # penalise angular velocity (smoothness)
    mppi_w_angular_acc: 0.3   # penalise angular acceleration (jerk)
    mppi_w_path: 3.0          # cross-track error to global plan

    # Obstacle cost shaping
    mppi_obstacle_lethal_m: 0.15   # closer = collision (huge penalty)
    mppi_obstacle_influence_m: 1.0 # soft penalty range

    # Global A* (coarse long-range routing, same as reactive_nav)
    global_downsample: 3
    global_inflation_m: 0.15
    global_replan_sec: 3.0
    global_waypoint_spacing_m: 1.5
    global_reach_fraction: 0.85
