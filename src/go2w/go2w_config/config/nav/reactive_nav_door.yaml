/**:
  ros__parameters:
    # RRT*-based reactive navigation for the door push task.
    # Aggressive obstacle thresholds so the robot drives close to the door
    # panel (bumper contact requires body center within ~0.36m of door face).

    max_linear_speed: 0.35
    max_angular_speed: 0.70
    control_rate: 12.0
    startup_delay: 0.0
    goal_tolerance: 0.15
    goal_reached_replan_cooldown_sec: 0.5

    # Very small obstacle distances so robot drives right up to the door
    obstacle_slow_dist: 0.20
    obstacle_stop_dist: 0.05
    front_half_angle_deg: 30.0
    side_check_angle_deg: 50.0
    avoidance_gain: 0.8
    turn_in_place_on_block: false

    rrt_sample_count: 500
    rrt_step_size: 0.25
    rrt_goal_bias: 0.20
    rrt_rewire_radius: 0.50
    rrt_grid_radius: 4.0
    rrt_grid_resolution: 0.10
    # Minimal inflation so paths fit through the door opening
    rrt_inflation_radius: 0.05
    rrt_replan_sec: 0.3
    rrt_informed_enabled: true
    rrt_goal_clip_distance: 4.0
    rrt_waypoint_lookahead: 0.40
    rrt_goal_search_radius: 1.5
    rrt_start_clearance_radius: 0.04
    # Unknown cells are free — door opening may have unknown cells
    rrt_unknown_is_obstacle: false

    global_downsample: 3
    global_inflation_m: 0.05
    global_replan_sec: 2.0
    global_waypoint_spacing_m: 1.0
