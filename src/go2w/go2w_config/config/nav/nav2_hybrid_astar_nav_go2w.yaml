# Hybrid A* + nav2_smac_planner Smoother nav for Go2W (B-route).
#
# This planner uses nav2_smac_planner's AStarAlgorithm<NodeHybrid> + Smoother
# as libraries (not plugins, no Nav2 lifecycle manager). Same I/O contract
# as astar_nav_node / hybrid_astar_nav_node — drop-in via:
#   nav_backend:=nav2_hybrid_astar
#   nav_backend:=nav2                  # alias
#
# Most search params map 1:1 to nav2's SmacPlannerHybrid yaml schema, so a
# tuner familiar with Nav2 can port nav2 yamls. Two notable differences:
#   - `ha_min_turning_radius_m` is in METRES (nav2 yaml uses metres too,
#     converted internally to costmap cells)
#   - `ha_analytic_expansion_max_length_m` likewise in metres
#
# Defaults tuned for MuJoCo demo1/demo3 with Go2W body 0.65×0.45 m.

nav2_hybrid_astar_nav:
  ros__parameters:
    use_sim_time: true

    # ── speed envelope ────────────────────────────────────────────────
    max_linear_speed:  0.70
    max_angular_speed: 1.00
    min_linear_speed:  0.05
    linear_accel_max:  0.50
    linear_decel_max:  0.50
    angular_accel_max: 1.20
    control_rate:      20.0
    startup_delay:     1.0
    startup_ramp_sec:  2.0

    # ── goal behaviour ────────────────────────────────────────────────
    goal_tolerance:                       0.25
    goal_slow_radius:                     1.5
    goal_slow_floor:                      0.15
    goal_reached_replan_cooldown_sec:     1.0
    goal_reached_brake_sec:               0.6

    # ── pure-pursuit + Stanley tracker (we keep ours; MPPI is A-route) ──
    lookahead_min:    0.30
    lookahead_max:    0.80
    lookahead_gain:   0.60
    # cross_track_gain history:
    #   0.70 (default)  → understeer (Stanley pull too weak in corners)
    #   1.20 (overshoot) → caused brake-stall when paired with eager curv decel
    #   1.00 (sweet spot) → balanced lateral correction, no stall
    cross_track_gain: 1.00

    # ── curvature speed shaping ───────────────────────────────────────
    # Anticipatory braking horizon. History:
    #   6  (0.6m)  → too late (0.86s window @ 0.7m/s, inertia overshoot)
    #   15 (1.5m)  → too early (brake-stall: v drops to ~0 before corner,
    #                pure-pursuit loses steering authority on tight ω
    #                because atan2(k·e, max(v,min_v)) saturates and
    #                CHAMP gait cuts ω at low v → robot "推头" stalls)
    #   10 (1.0m)  → sweet spot: enough lookahead to slow gracefully
    #                without bleeding all kinetic energy on the straight
    curvature_lookahead_segments: 10
    curv_full_speed_below:        0.30
    # 1.50 → 0.80 was too aggressive (caused stall pairing).
    # 1.15 keeps full-speed up to R≈0.87m, brakes on tighter corners.
    # Paths near our min_R=0.8m still trigger ~70% slowdown but retain
    # ~0.20 m/s entry speed — enough for steering authority.
    curv_slow_above:              1.15
    curv_factor_min:              0.10

    # ── reactive scan brake ───────────────────────────────────────────
    obstacle_slow_dist:   0.75
    obstacle_stop_dist:   0.35
    front_half_angle_deg: 35.0

    # ── map / costmap ─────────────────────────────────────────────────
    map_topic: ""               # empty → "/{namespace}/map"
    map_frame: "map"
    base_frame: "base_link"
    map_occupied_thresh: 50
    global_replan_sec:   1.5
    resample_step_m:     0.10

    # ── Hybrid A* (nav2_smac_planner SearchInfo schema) ───────────────
    # SearchInfo defaults closely follow SmacPlannerHybrid's own defaults:
    #   non_straight_penalty: 1.05  (slight pref for straight)
    #   change_penalty:       0.0   (free direction changes)
    #   reverse_penalty:      2.0
    #   cost_penalty:         2.0   (multiplier on costmap obstacle cost)
    #   retrospective_penalty:0.015 (regularizer)
    #   rotation_penalty:     5.0
    #   analytic_expansion_ratio: 3.5
    ha_min_turning_radius_m:        0.80
    ha_allow_reverse:               false   # forward-only Dubins; flip → REEDS_SHEPP
    ha_reverse_penalty:             2.0
    ha_non_straight_penalty:        1.05
    ha_change_penalty:              0.0
    ha_cost_penalty:                2.0
    ha_retrospective_penalty:       0.015
    ha_rotation_penalty:            5.0
    ha_analytic_expansion_ratio:    3.5
    ha_analytic_expansion_max_length_m: 3.0
    ha_max_iters:                   1000000
    ha_max_planning_time_sec:       2.0
    ha_goal_tolerance_cells:        0.5
    # Heuristic precomputed-lookup-table radius in METRES (converted
    # internally to costmap cells via /resolution before passing to
    # nav2_smac_planner::AStarAlgorithm::initialize). Default 20.0
    # matches nav2's SmacPlannerHybrid default `lookup_table_size`.
    ha_lookup_table_m:              20.0

    # ── footprint (rectangle, metres) ─────────────────────────────────
    footprint_length: 0.65
    footprint_width:  0.45

    # ── nav2 Smoother ─────────────────────────────────────────────────
    smoother_max_time_sec:        0.10
    smoother_inflation_radius_m:  0.40

    # nav2_smac_planner Smoother declares its own params under "path.smoother.*".
    # Reasonable defaults from nav2_smac_planner:
    #   path.smoother.tolerance:      1e-10
    #   path.smoother.max_iterations: 1000
    #   path.smoother.w_data:         0.2
    #   path.smoother.w_smooth:       0.3
    #   path.smoother.do_refinement:  true
    # Override here if needed:
    path:
      smoother:
        tolerance:      1.0e-4
        max_iterations: 1000
        w_data:         0.2
        w_smooth:       0.3
        do_refinement:  true

    # ── hybrid_cmd_router mode bias (wheel ↔ leg) ─────────────────────
    wheel_linear_threshold_for_bias:  0.18
    wheel_angular_threshold_for_bias: 0.30
    leg_heading_threshold_deg:        12.0
    legs_mode_v_cap:                  0.15
    legs_mode_w_cap:                  0.45

    # ── glue topics ───────────────────────────────────────────────────
    frontier_replan_topic: "/frontier_replan"
    stop_topic:            "/stop"
