# Nav2 full-stack config for **Go2 (non-wheeled, walking quadruped)**.
# Twin of nav2_go2w_full_stack.yaml — same plugin choices
# (SmacPlannerHybrid + MPPI + behavior_server + lifecycle_manager),
# tuned for legged-only CHAMP gait.
#
# What's different from the Go2W file (and why):
#   - Footprint 0.70 × 0.40 m. The base is narrower than Go2W, but
#     MuJoCo contact validation shows the walking thigh/calf sweep needs
#     the same lateral envelope at obstacle corners. Half-extents
#     (0.35, 0.20).
#   - vx_max  0.50 → 0.30 m/s     — CHAMP walking-gait stable cap
#   - vx_min -0.20 → -0.10 m/s    — Go2 reverses but slow
#   - wz_max  1.0  → 0.8  rad/s   — pivot a bit gentler than wheels
#   - ax_max  0.5  → 0.30 m/s²    — softer accel for walking
#   - minimum_turning_radius 0.30 → 0.05 m — Go2 pivots in place via CHAMP
#     in-place rotation gait
#   - inflation_radius 0.45 → 0.30 m (local) = half-width 0.20 + 0.10
#     buffer for leg swing/body sway during walk
#   - inflation_radius 0.30 → 0.25 m (global) — comfort margin only;
#     SmacHybrid's footprint check is the real safety guarantee
#   - collision_margin_distance 0.03 → 0.10 m to reject corner-scraping
#     trajectories before MuJoCo thigh/calf collision occurs
#
# Topics (root_key gets rewritten to robot_b at launch via RewrittenYaml):
#   /robot_b/map               (OccupancyGrid from octomap_server)
#   /robot_b/odom/nav          (from slam_odom_relay, → "odom" via remap)
#   /robot_b/scan_3d           (from pointcloud_to_laserscan)
#   /tf, /tf_static            (namespaced via launch remap)

# ============================================================
# COSTMAPS
# ============================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: b_base_link  # Go2/robot_b URDF uses b_-prefixed links
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # 2026-05-14: MuJoCo validation showed contacts on b_RL/b_FL thigh
      # collision links near demo3_mixed corner obstacles when the Go2 Nav2
      # profile used only the narrow base footprint (0.65 x 0.30 m). Use the
      # same 0.70 x 0.40 m envelope as Go2W: wheelbase/body length plus
      # front/rear buffer, track plus walking leg-swing buffer. With
      # consider_footprint=
      # true on the MPPI ObstaclesCritic, the controller checks the
      # *rotated rectangle* per predicted pose instead of a 0.40 m
      # circle. In demo3_mixed narrow passages the rectangle remains the
      # least conservative model that still covers leg sweep; the old circle
      # approximation rejected valid passages.
      footprint: "[[0.32, 0.18], [0.32, -0.18], [-0.32, -0.18], [-0.32, 0.18]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /robot_b/scan_3d
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          obstacle_max_range: 5.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 2026-05-20: REVERTED 0.40 → 0.28. The 0.40 (circumscribed-radius)
        # bump made MPPI's ObstaclesCritic penalize EVERY forward rollout out
        # of the tight ops2 spawn pocket → robot wiggled in place, never
        # traversed (verified live: WALL_HIT, cmd v=0.3 but moved 5.9 cm/10s;
        # robot's own cell intermittently cost 75-78 → NO_PLAN). 0.28 keeps a
        # comfortable margin over the inscribed radius (~0.21) for the #2b
        # footprint concern but leaves corridor centres low-cost so MPPI can
        # commit. SmacHybrid's 0.4 m goal tolerance + allow_unknown=false in
        # CFPA2 are the real guards against cost-0 goals the footprint can't
        # reach — not over-inflation.
        #
        # 2026-05-20 (−x maze): the winding −x branch is a 1.0 m physical
        # corridor (trav grid lethal-to-lethal). The robot (0.64×0.36) must TURN
        # through its chicanes, so it needs a cost-0 lane ≥ its 0.64 m turning
        # envelope. inflation_radius 0.28 left only 1.0−2·0.28 = 0.44 m cost-0 →
        # footprint can't turn → robot wedged at −8.4 (run29 STALL, costmap
        # corridor crushed to 0.50 m while the physical corridor is 1.0 m).
        # 0.16 leaves 1.0−2·0.16 = 0.68 m cost-0 (≥ 0.64 m) so SmacHybrid can
        # thread + turn; consider_footprint=true remains the EXACT collision
        # guard (1 m corridor, 0.36 m robot → 0.32 m clearance, no real hit).
        inflation_radius: 0.16
        cost_scaling_factor: 6.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: b_base_link  # Go2/robot_b URDF uses b_-prefixed links
      # See local_costmap footprint comment above. Same rectangle for global.
      footprint: "[[0.32, 0.18], [0.32, -0.18], [-0.32, -0.18], [-0.32, 0.18]]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        # 2026-05-18: switched from /robot_b/map (octomap projection — bridges
        # show as obstacles because octomap traces LiDAR hits regardless of
        # height) to /robot_b/traversability_grid (CNN+ramp_safe+bridge-override
        # fused trav layer). The trav grid correctly clears overhead-only
        # geometry.
        map_topic: /robot_b/traversability_grid
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 2026-05-20: REVERTED 0.40 → 0.28 (see local_costmap note). This is
        # the costmap CFPA2 reads; 0.28 + occ_thresh 70 still keeps CFPA2's
        # free space close to SmacHybrid-plannable while leaving the spawn
        # pocket exit open.
        # 2026-05-20 (−x maze): 0.28 → 0.16 (see local_costmap note). CFPA2
        # reads THIS costmap (occ_thresh 70); with 0.16 the 1.0 m −x corridor
        # centre drops below 70 → CFPA2 marks it reachable and can push −x goals
        # deeper into the maze instead of stalling at the first inflation pinch.
        inflation_radius: 0.16
        cost_scaling_factor: 6.0
      always_send_full_costmap: true

# ============================================================
# PLANNER SERVER (SmacPlannerHybrid, REEDS_SHEPP)
# ============================================================
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.4
      allow_unknown: true
      max_iterations: 1000000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"   # supports forward + reverse
      angle_quantization_bins: 36              # 10° bins
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      # Go2 walking gait pivots in place via CHAMP's in-place rotation
      # mode (cmd_vel = (0, 0, ω)). Reeds-Shepp 0 is degenerate, so
      # 0.05 m approximates "rotate-then-go" with negligible loss.
      # Tighter than Go2W (0.30) because no wheel skid-steer arc.
      minimum_turning_radius: 0.05
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 3.5
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ============================================================
# CONTROLLER SERVER (DWB with oriented footprint check)
# ============================================================
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 12.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # Nav2's goal checker is Euclidean-only; keep it body-scale so a
      # brown-box obstacle cannot make Go2 succeed on a frontier that is
      # still occluded on the other side. CFPA2 owns the relaxed 1.0 m
      # sensing-waypoint rule and now requires map line-of-sight before
      # it switches/blacklists a frontier as explored.
      xy_goal_tolerance: 0.50
      yaw_goal_tolerance: 3.14
      stateful: true
    FollowPath:
      # 2026-05-19 CUDA-MPPI: drop-in subclass of nav2_mppi_controller::
      # MPPIController. When `use_cuda: true`, the per-iteration MPPI body
      # (generateNoisedTrajectories + evalTrajectoriesScores +
      # updateControlSequence) runs on the GPU via the nav_algo_mppi_cuda
      # backend. When `use_cuda: false`, the upstream xtensor CPU path runs
      # unchanged (graceful fallback when no GPU is present).
      plugin: "nav2_mppi_controller_cuda_plugin::CudaMPPIController"
      use_cuda: true
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.20
      vy_std: 0.20
      wz_std: 0.40
      vx_max: 0.30       # CHAMP walking-gait stable cap (vs Go2W's 0.50)
      vx_min: -0.10      # Go2 reverses but slow (vs Go2W's -0.20)
      vy_max: 0.0        # diff-drive — no strafe in routing layer
      wz_max: 0.8        # gentler pivot than Go2W's 1.0
      ax_max: 0.30       # softer accel for walking (vs Go2W's 0.50)
      ax_min: -0.40
      ay_max: 0.0
      az_max: 1.0
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstrains:
        min_turning_r: 0.3
      critics:
        - "ConstraintCritic"
        - "ObstaclesCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 3.0
        critical_weight: 20.0
        # 2026-04-28: enabled. Tested on humble 1.1.20 — the prior
        # "throws at configure-time" comment turned out to be a polygon-
        # parsing fail when the yaml used `robot_radius:`; with a real
        # `footprint:` polygon param on both costmaps, MPPI reads a 4-pt
        # rectangle at configure and FootprintCollisionChecker initialises
        # cleanly. Effective rejection envelope is now the *rotated body*
        # (0.70 × 0.40 m) plus collision_margin_distance, instead of a
        # 0.40 m circle + 0.20 m margin. Lets the robot commit to 0.42 m
        # corridors that the planner can already plan.
        consider_footprint: true
        collision_cost: 10000.0
        # Tightened to 0.05 m 2026-05-18 to fit through narrow ops2 paths.
        collision_margin_distance: 0.05
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.2
        mode: 0

# ============================================================
# BEHAVIOR SERVER (recovery primitives)
# ============================================================
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    # No Spin recovery for legged Go2: in-place rotation near inflated wall
    # corners can sweep thighs/calves into MuJoCo obstacle geometry.
    behavior_plugins: ["backup", "wait"]
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: b_base_link  # Go2/robot_b URDF uses b_-prefixed links
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.5

# ============================================================
# BT NAVIGATOR (orchestrates planner + controller + behaviors)
# ============================================================
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: b_base_link  # Go2/robot_b URDF uses b_-prefixed links
    # Go2/robot_b odom. Keep this namespaced correctly: using robot_a odom
    # makes BT recovery/progress decisions for the wrong robot.
    odom_topic: /robot_b/odom/nav
    bt_loop_duration: 10
    default_server_timeout: 20
    # Launch files override this to go2w_config's no-spin Go2 tree via package
    # share path. Keep a bundled fallback for direct parameter-file use.
    # Absolute path — nav2 yaml does NOT resolve $(find-pkg-share ...).
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    # Full default Nav2 BT plugin set — matches nav2_params.yaml. Trimming
    # individual plugins triggers "Node not recognized" errors when the
    # bundled XML behaviour trees reference any missing plugin.
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# ============================================================
# LIFECYCLE MANAGER (brings all nav2 servers up)
# ============================================================
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 0.0
    node_names:
      - "controller_server"
      - "planner_server"
      - "behavior_server"
      - "bt_navigator"
