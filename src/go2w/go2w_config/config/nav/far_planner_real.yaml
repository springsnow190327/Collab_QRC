# FAR planner — real-robot tuning (stub; tune on hardware).
#
# Differences from far_planner_tuning.yaml (MuJoCo sim):
#   - Obstacle decay times shorter — real LiDAR is noisier, we want stale
#     spurious hits to clear faster so FAR doesn't get trapped by ghosts.
#   - sensor_range tighter — L1/Mid360 both usefully see ~6 m indoors, but
#     noise past 4 m corrupts the v-graph on real more than in sim.
#   - obs_inflate_size bumped — real-robot footprint is less well-known,
#     and we'd rather bias conservative.
#
# Tune on hardware first; these are starting points, not validated values.

far_planner:
  ros__parameters:
    g_planner/converge_distance: 0.5
    g_planner/path_momentum_thred: 20
    graph/connect_votes_size: 6

    voxel_dim: 0.2

    util/terrain_free_Z: 0.45
    util/obs_inflate_size: 2
    util/dynamic_obs_dacay_time: 1.5
    util/new_points_decay_time: 1.5

    sensor_range: 4.0
    terrain_range: 3.5
    local_planner_range: 2.0
    map_handler/map_grid_max_length: 30.0

    is_debug_output: false
    is_opencv_visual: false

    world_frame: "map"
