# Nav2 full-stack config for **REAL Go2W (wheeled-legged quadruped)**.
#
# Forked from nav2_go2_real.yaml on 2026-05-01 with Go2W kinematics +
# footprint substitutions. Sim Go2W stays on nav2_go2w_full_stack.yaml
# (its narrow-corridor demo3_mixed tuning would conflict with real-bot
# noise tolerance). The MPPI safety + map-cleanup deltas are identical
# to nav2_go2_real.yaml — see that file for the rationale.
# What's different from the sim file (and why):
#
#   ── Time + namespace ──
#   - use_sim_time = false everywhere (wallclock).
#   - Topics use /robot/... instead of /robot_b/... (real is single-robot;
#     no PushRosNamespace rewrite via /robot_[ab]/ regex needed since the
#     names already match).
#   - bt_navigator.odom_topic fixed: sim file has a copy-paste typo
#     /robot_a/odom/nav (should be the legged robot's odom). Real points
#     at /robot/odom/nav directly.
#
#   ── Planner: SmacPlannerHybrid budget ──
#   - max_iterations 1,000,000 → 80,000 (real laptop CPU + indoor scenes
#     converge well under 80k iters; 1M was uselessly large and let bad
#     plans run for the full 5s timeout repeatedly).
#   - max_planning_time 5.0 → 1.5 s (fail-fast; bt_navigator retry loop
#     wins back wall-time slowness).
#   - cache_obstacle_heuristic false → true (reuse heuristic between
#     replans — single-goal incremental-map scenarios benefit massively
#     from this; ~3-5× planner speedup on real after warmup).
#
#   ── Costmaps: Mid-360 noise tolerance ──
#   - local_costmap.inflation_radius 0.25 → 0.18 (Mid-360 specular
#     speckle creates spurious occupied cells; wider inflation paints
#     "almost-lethal" bands across corridors → MPPI rejects every
#     trajectory → robot stamps in place).
#   - local_costmap.cost_scaling_factor 5.0 → 3.0 (softer cost gradient;
#     the lethal penalty only spikes near the boundary, not 0.45 m out).
#   - global_costmap.inflation_radius 0.20 → 0.18, scaling 5.0 → 3.0
#     (matched).
#   - global_costmap.update_frequency 1.0 → 2.0 (more responsive to
#     incremental octomap updates; planner uses fresher map each replan).
#
#   ── MPPI: laptop CPU budget + less aggressive obstacle critic ──
#   - batch_size 2000 → 1000 (half the trajectory samples per cycle;
#     20 Hz controller_frequency held without dropping frames).
#   - ObstaclesCritic.critical_weight 20.0 → 8.0 (less drastic rejection
#     for trajectories whose footprint marginally clips inflated cells —
#     paired with the inflation_radius drop above so that "marginal clip"
#     still means a real-cell collision is unlikely; main lever to break
#     the "robot won't move" pathology).
#
# Topics (real, single-robot — namespace = /robot):
#   /robot/map               (OccupancyGrid from octomap_server)
#   /robot/odom/nav          (from fast_lio_tf_adapter)
#   /robot/scan_3d           (from scan_rear_filter)
#   /tf, /tf_static          (global, single-robot)

# ============================================================
# COSTMAPS
# ============================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link  # Real single-robot: no b_-prefix (sim convention only)
      transform_tolerance: 0.5     # cross-host DDS TF skew headroom (2026-05-01)
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # Go2 footprint: 0.65 × 0.30 m (no wheel hubs). Half-extents (0.325, 0.15).
      # See nav2_go2_full_stack.yaml comment block for the geometric derivation.
      # 2026-05-01 narrow-corridor pass: chassis is 0.31 m wide
      # (Unitree Go2W spec); 3 cm sway buffer per side → 0.34 m
      # polygon width. Original 0.40 m wide polygon left only
      # 2.5 cm/side clearance in 0.45 m corridors → MPPI vetoed.
      footprint: "[[0.34, 0.17], [0.34, -0.17], [-0.34, -0.17], [-0.34, 0.17]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /robot/scan_3d
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          obstacle_max_range: 5.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 2026-05-01 retune (post map-cleanup): map is now clean enough
        # (RANSAC + occupancy_min_z=-0.45) that inflation can reach
        # farther without flooding the cost field with noise. Larger
        # radius pulls MPPI toward corridor centers; gentler falloff
        # keeps the gradient smooth so 0.6 m doors remain navigable.
        # Body half-width 0.15 + 0.10 m comfort buffer = 0.25 m radius
        # at exp decay 2.5. Lethal cost only inside ~0.10 m of an
        # occupied cell, so a 0.6 m gap (= 0.30 m clear each side from
        # body center) still has a finite-cost trajectory through it.
        inflation_radius: 0.25
        cost_scaling_factor: 2.5
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # 2026-05-01: 2 → 5 Hz. Octomap publishes /robot/map at ~2 Hz
      # but Fast-LIO drift can shift things between octomap ticks;
      # higher costmap update rate ingests the latest map sooner so
      # the planner doesn't replan against 500 ms-stale data.
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 0.5    # cross-host DDS TF skew headroom (2026-05-01)
      # 2026-05-01 narrow-corridor pass: chassis is 0.31 m wide
      # (Unitree Go2W spec); 3 cm sway buffer per side → 0.34 m
      # polygon width. Original 0.40 m wide polygon left only
      # 2.5 cm/side clearance in 0.45 m corridors → MPPI vetoed.
      footprint: "[[0.34, 0.17], [0.34, -0.17], [-0.34, -0.17], [-0.34, 0.17]]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /robot/map
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.25            # match local_costmap (2026-05-01)
        cost_scaling_factor: 2.5
      always_send_full_costmap: true

# ============================================================
# PLANNER SERVER (SmacPlannerHybrid, REEDS_SHEPP)
# ============================================================
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.4
      allow_unknown: true
      # 80k vs sim's 1M. Indoor environments converge well below 80k;
      # 1M let pathological cases burn the full 1.5 s budget repeatedly.
      max_iterations: 80000
      # 1.5 s vs sim's 5.0. Fail-fast philosophy: better 4× retries at
      # 1.5 s each than one 5 s attempt that times out anyway.
      max_planning_time: 1.5
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 36
      analytic_expansion_ratio: 3.5
      # 2026-05-01: 3.0 → 1.0. Long analytic Reeds-Shepp expansions
      # near goal could thread through tight geometry, producing a
      # single sharp curve at the path *start* that MPPI can't follow
      # smoothly. 1.0 m keeps analytic segments short — they only
      # kick in when robot is genuinely close to goal, not when 3 m
      # of corridor still need lattice planning.
      analytic_expansion_max_length: 1.0
      # Go2W on wheels — can pivot tight but not in-place.
      # 2026-05-01: 0.30 → 0.50 m. 0.30 m was kinematically reachable
      # but produced sharp bends in 0.45 m corridors that MPPI couldn't
      # track smoothly. 0.50 m forces wider, gentler arcs so the path
      # flows. Path is still tight enough for indoor geometry; the
      # 5 cm/side clearance in 0.45 m corridors stays valid (chassis
      # 0.34 m + arc fits in the corridor over a longer travel).
      minimum_turning_radius: 0.50
      # 2026-05-01: strongly discourage reverse-oriented path starts on real.
      # Reeds-Shepp was legally producing paths whose pose orientations point
      # opposite the XY tangent near the start, so the robot kept hunting
      # around yaw / circling instead of committing to a forward turn-in.
      # Keep reverse available as an escape hatch, but make it expensive
      # enough that forward arcs win unless reverse is genuinely necessary.
      reverse_penalty: 8.0
      # Non-zero direction-change penalty further suppresses "flip to reverse
      # then flip back" path prefixes that look geometrically short but are
      # poor matches for the Go2W's real closed-loop behavior.
      change_penalty: 1.0
      # 2026-05-01: 1.20 → 1.50. Higher penalty for non-straight motion
      # discourages MPPI's downstream zigzag. Hybrid A* prefers straighter
      # paths through the corridor; MPPI then has less geometric reason
      # to oscillate.
      non_straight_penalty: 1.50
      # 2026-05-01: 2.0 → 4.0. Stronger aversion to inflated/high-cost
      # cells (cells in the inflation_radius gradient, not lethal). With
      # cost_penalty=2.0 the planner happily routed through near-obstacle
      # bands when shorter; 4.0 makes it actively prefer the centerline
      # of corridors. Lethal cells were already vetoed; this only
      # affects the gradient zone.
      cost_penalty: 4.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      # ENABLE on real: heuristic cache reuse across replans gives a
      # 2026-05-01 reverted to false. Theory was sound (3-5× speedup
      # on stable maps) but real-robot reality breaks the assumption:
      # Fast-LIO drift continuously shifts the global frame, octomap
      # adds/removes voxels, and any movement of a 0.31 m chassis
      # through a 0.45 m corridor produces a different costmap each
      # 100 ms. The cached obstacle-distance heuristic guides A* using
      # *previous* costmap state — so the planner happily routed
      # through cells the cache thought were free but the *current*
      # costmap marked as occupied. Symptom: planned path visibly
      # crossing black voxels in /robot/map.
      # Cost of disabling: planner re-computes the obstacle heuristic
      # each iteration. Empirical real-robot planning time stays under
      # max_planning_time (1.5 s) for indoor scenes < 50 m².
      cache_obstacle_heuristic: false
      smooth_path: true
      smoother:
        # 2026-05-01: more aggressive post-planning smoothing to iron
        # out lattice-discretization kinks. With cost_penalty 4.0 +
        # consider_footprint true, the smoothed path stays clear of
        # walls; the smoother just removes corner-cutting artefacts.
        max_iterations: 2000     # was 1000
        w_smooth: 0.5            # was 0.3 — stronger smoothing pull
        w_data: 0.2
        tolerance: 1.0e-10

# ============================================================
# CONTROLLER SERVER (Nav2 MPPI)
# ============================================================
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 12.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 0.50
      stateful: true
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      # 1000 vs sim's 2000. Halves CPU per controller cycle; we keep
      # 20 Hz controller_frequency cleanly on the laptop and trajectory
      # quality stays good for indoor speeds (vx_max=0.30).
      batch_size: 1000
      vx_std: 0.20
      vy_std: 0.20
      wz_std: 0.40
      vx_max: 0.50       # Go2W wheels — faster than Go2 walking
      vx_min: -0.20      # reverse OK on wheels
      vy_max: 0.0        # diff-drive — no strafe
      wz_max: 1.0        # wheel-pivot can spin faster than walking
      ax_max: 0.50       # wheels accelerate quicker than gait
      ax_min: -0.50
      ay_max: 0.0
      az_max: 1.0
      iteration_count: 1
      # 2026-05-01: 1.7 → 2.5 m. With sharper-bend planner output
      # eliminated by the smoother + min_turning_radius 0.50 changes,
      # MPPI now benefits from looking further ahead — anticipates
      # bends earlier instead of veering at the last meter.
      prune_distance: 2.5
      # 2026-05-01: 0.2 → 0.5. Cross-host DDS between Jetson (Foxy) and
      # laptop (Humble) introduces TF timestamp skew of up to ~300 ms
      # under network jitter. Default 0.2 s caused controller_server
      # to drop EVERY input frame as "earlier than transform cache" —
      # silent failure mode, no cmd_vel output, robot stationary.
      # 0.5 s buys headroom for clock skew without making MPPI track
      # noticeably-stale poses (controller still runs at 20 Hz so a
      # 0.5 s window is at most 10 cycles of latency, well under
      # MPPI's 56-step / 2.8 s prediction horizon).
      transform_tolerance: 0.5
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstrains:
        min_turning_r: 0.3
      critics:
        - "ConstraintCritic"
        - "ObstaclesCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        # 2026-05-01 retune (post map-cleanup):
        #   With cleaner map, two-tier obstacle response is now tractable:
        #     – critical_weight 12.0 (was 8.0): sharper veto at footprint
        #       contact. Speckle-induced one-cycle false-positives are
        #       largely gone (filter_speckles=False but RANSAC tighter
        #       and occupancy_min_z higher), so a hard veto rarely fires
        #       on noise.
        #     – repulsion_weight 2.5 (was 1.5): stronger general avoidance
        #       in the cost field. Combined with softer inflation gradient
        #       (cost_scaling 2.5), MPPI feels obstacles from farther but
        #       isn't blocked by them.
        # Pivot-protection margin (0.10 m) is preserved — the swept-arc
        # gap analysis for the rotated footprint hasn't changed.
        repulsion_weight: 2.5
        # 2026-05-01 narrow-corridor pass v2: 12 → 15 made MPPI zigzag
        # because every minor pose-noise excursion crossed the now-tight
        # 0.03 m margin and got vetoed; sampler kept switching plans.
        # Reverted to 12: still a strong veto inside 0.03 m (12 ×
        # collision_cost 10000 = significant), without firing on noise.
        critical_weight: 12.0
        consider_footprint: true
        collision_cost: 10000.0
        # 0.10 → 0.03 m. Original 0.10 covered the swept-arc gap during
        # pivots, but in 0.45 m corridors with 0.34 m polygon body the
        # 0.10 margin engulfed the entire passable corridor (5.5 cm
        # clearance/side < 10 cm margin → MPPI vetoed every trajectory).
        # 0.03 m trusts the polygon for forward motion; pivot-arc
        # protection (was wz_max × tail × dt = 1.75 cm/step for Go2W)
        # is now covered by the margin × 1.7 safety factor instead of
        # the original 5×.
        # Trade-off: occasional tail brushes during max-ω pivots in
        # tight corners. Proper fix is a mode-aware ObstaclesCritic
        # custom plugin (separate work).
        collision_margin_distance: 0.03
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.2
        mode: 0

# ============================================================
# BEHAVIOR SERVER (recovery primitives)
# ============================================================
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5    # was 0.1 — same cross-host DDS skew rationale as MPPI
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.5

# ============================================================
# BT NAVIGATOR (orchestrates planner + controller + behaviors)
# ============================================================
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    # Real-robot odom: /robot/odom/nav. Sim file had /robot_a/odom/nav
    # (typo, should have been robot_b's).
    odom_topic: /robot/odom/nav
    bt_loop_duration: 10
    default_server_timeout: 20
    # 2026-05-01: switched from the basic 1 Hz blind-replan BT to the
    # IsPathValid-aware variant. Default BT replanned every 1s regardless;
    # if Fast-LIO drifts mid-mission or a new obstacle pops in (~10 Hz
    # map updates), the robot follows the stale plan into the obstacle
    # for up to 1 s before the next blind replan.
    # The new BT runs at 2 Hz, calls IsPathValid every tick, and
    # triggers an immediate replan if any waypoint enters a lethal
    # cell. Path also force-replans if older than 10 s (drift safety).
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/nav_to_pose_with_consistent_replanning_and_if_path_becomes_invalid.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# ============================================================
# LIFECYCLE MANAGER
# ============================================================
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 0.0
    node_names:
      - "controller_server"
      - "planner_server"
      - "behavior_server"
      - "bt_navigator"
