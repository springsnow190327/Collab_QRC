name: nvblox premerge
on:
  pull_request:
jobs:
  ## ------------------------------------------
  ## Linting and formatting
  ## ------------------------------------------
  lint_precommit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit clang-format==14.0.6
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
  ## ------------------------------------------
  ## Build and test x86/CU11/U22
  ## ------------------------------------------
  premerge_x86_cu11_u22:
    name: Build&Test x86-CU11-U22
    needs: [lint_precommit]
    runs-on: [self-hosted, gpu] # GPU jobs will run on AWS
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: premerge_x86_cu11_u22 - Unit tests
        uses: ./.github/actions/build-and-test
        with:
          platform: x86_64
          cuda-version: '11'
          ubuntu-version: '22'
          run-python-tests: false # Not supported on cuda11
          run-realsense-tests: false # Not supported on cuda11
          ngc-api-key: ${{ secrets.NGC_API_KEY }}
  ## ------------------------------------------
  ## Build and test x86/CU12/U22
  ## ------------------------------------------
  premerge_x86_cu12_u22:
    name: Build&Test x86-CU12-U22
    needs: [lint_precommit]
    runs-on: [self-hosted, gpu] # GPU jobs will run on AWS
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: premerge_x86_cu12_u22 - Unit tests
        uses: ./.github/actions/build-and-test
        with:
          platform: x86_64
          cuda-version: '12'
          ubuntu-version: '22'
          ngc-api-key: ${{ secrets.NGC_API_KEY }}
  ## ------------------------------------------
  ## Build and test x86/CU13/U24
  ## ------------------------------------------
  premerge_x86_cu13_u24:
    name: Build&Test x86-CU13-U24
    needs: [lint_precommit]
    runs-on: [self-hosted, gpu] # GPU jobs will run on AWS
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: premerge_x86_cu13_u24 - Unit tests
        uses: ./.github/actions/build-and-test
        with:
          platform: x86_64
          cuda-version: '13'
          ubuntu-version: '24'
          ngc-api-key: ${{ secrets.NGC_API_KEY }}
          run-realsense-tests: false # TODO(dtingahl) make realsense docker build for cuda13
          run-bazel-tests: true
  ## --------------------------------------------------------
  ## Build and test x86/CU12/U22/gcc-sanitizer
  ## --------------------------------------------------------
  premerge_x86_cu12_u22_debug:
    name: Build&Test x86-gcc-sanitizer
    needs: [lint_precommit]
    runs-on: [self-hosted, gpu] # GPU jobs will run on AWS
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: premerge_x86_cu12_u22_debug - Unit tests
        uses: ./.github/actions/build-and-test
        with:
          platform: x86_64
          cuda-version: '12'
          ubuntu-version: '22'
          gcc-sanitizer: 1
          ngc-api-key: ${{ secrets.NGC_API_KEY }}
          run-python-tests: false
          run-realsense-tests: false
          run-cuda-sanitizer: false
  ## --------------------------------------------------------
  ## Build docs
  ## --------------------------------------------------------
  build_docs:
    name: Build docs
    needs: [lint_precommit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install doxygen
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends doxygen
      - name: Build docs
        working-directory: ./docs
        run: |
          pip3 install -r requirements.txt
          make multi-docs
          touch ./_build/.nojekyll
